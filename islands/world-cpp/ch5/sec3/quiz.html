<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C++ 基础挑战：类型与判断</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Fira+Code&display=swap" rel="stylesheet">
<style>
:root {
--primary-color: #6C5CE7;
--secondary-color: #A29BFE;
--bg-color: #DFE6E9;
--card-bg: #FFFFFF;
--text-color: #2D3436;
--correct-color: #00b894;
--wrong-color: #d63031;
--accent-yellow: #fdcb6e;
--code-bg: #2d2d2d;
--code-text: #ccc;
--code-kw: #cc99cd;
--code-fn: #6196cc;
--code-num: #f08d49;
--code-str: #7ec699;
--code-cmt: #999;
}

    body {
        font-family: 'Poppins', 'Microsoft YaHei', sans-serif;
        background-color: var(--bg-color);
        background-image: radial-gradient(#b2bec3 10%, transparent 10%);
        background-size: 20px 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
    }

    .game-container {
        background: var(--card-bg);
        width: 100%;
        max-width: 700px;
        border-radius: 25px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        padding: 40px;
        text-align: center;
        position: relative;
        border: 4px solid var(--secondary-color);
        overflow: hidden;
    }

    .header-stats {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--primary-color);
    }

    .score-box {
        background: var(--accent-yellow);
        padding: 8px 20px;
        border-radius: 30px;
        color: #fff;
        box-shadow: 0 4px 0 #e1b12c;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .progress-container {
        width: 100%;
        height: 12px;
        background-color: #ecf0f1;
        border-radius: 10px;
        margin-bottom: 35px;
        overflow: hidden;
    }
    .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--secondary-color), var(--primary-color));
        transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .question-area {
        text-align: left;
        margin-bottom: 30px;
    }
    
    .question-area h2 {
        color: var(--text-color);
        font-size: 1.4rem;
        line-height: 1.6;
        margin-bottom: 15px;
    }

    .code-block {
        background: var(--code-bg);
        color: var(--code-text);
        font-family: 'Fira Code', monospace;
        padding: 15px;
        border-radius: 10px;
        margin: 15px 0;
        white-space: pre-wrap;
        text-align: left;
        font-size: 0.95rem;
        border-left: 5px solid var(--secondary-color);
    }
    .kw { color: var(--code-kw); font-weight: bold; }
    .fn { color: var(--code-fn); }
    .num { color: var(--code-num); }
    .str { color: var(--code-str); }
    .cmt { color: var(--code-cmt); font-style: italic; }

    .options-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 15px;
    }
    @media (min-width: 600px) {
        .options-grid { grid-template-columns: 1fr 1fr; }
    }

    .option-btn {
        background: white;
        border: 3px solid #ecf0f1;
        padding: 18px 25px;
        border-radius: 18px;
        font-size: 1.05rem;
        font-family: inherit;
        cursor: pointer;
        transition: all 0.2s;
        color: var(--text-color);
        font-weight: 600;
        text-align: left;
        position: relative;
        box-shadow: 0 5px 0 #bdc3c7;
    }

    .option-btn:hover:not([disabled]) {
        border-color: var(--secondary-color);
        transform: translateY(-3px);
    }

    .option-btn:active:not([disabled]) {
        top: 5px;
        box-shadow: 0 0 0 #bdc3c7;
    }
    
    .option-btn.correct {
        background-color: var(--correct-color);
        color: white;
        border-color: var(--correct-color);
        box-shadow: 0 5px 0 #00965e;
    }

    .option-btn.wrong {
        background-color: var(--wrong-color);
        color: white;
        border-color: var(--wrong-color);
        box-shadow: 0 5px 0 #c0392b;
    }

    .feedback-section {
        display: none;
        text-align: left;
        background: #f1f2f6;
        padding: 25px;
        border-radius: 18px;
        margin-top: 30px;
        border-left: 6px solid;
    }
    .feedback-section.correct { border-color: var(--correct-color); }
    .feedback-section.wrong { border-color: var(--wrong-color); }

    .next-btn {
        background: var(--primary-color);
        color: white;
        border: none;
        padding: 12px 35px;
        border-radius: 50px;
        font-size: 1.1rem;
        font-family: inherit;
        font-weight: 600;
        cursor: pointer;
        margin-top: 20px;
        float: right;
    }

    .end-screen {
        display: none;
        padding: 20px 0;
    }
</style>
</head>
<body>

<div class="game-container">
    <div id="quiz-view">
        <div class="header-stats">
            <span id="level-indicator">Level 1 / 10</span>
            <div class="score-box">⭐ <span id="score">0</span></div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="question-area" id="question-container"></div>
        <div class="options-grid" id="options-container"></div>

        <div class="feedback-section" id="feedback-area">
            <div style="font-weight: 600; font-size: 1.2rem; margin-bottom: 10px;" id="feedback-title"></div>
            <div style="color: #636e72; line-height: 1.7;" id="explanation-text"></div>
            <button class="next-btn" onclick="nextQuestion()">下一题 ➔</button>
        </div>
    </div>

    <div id="end-screen" class="end-screen"></div>
</div>

<script>
    const quizData = [
        {
            q: "在 C++ 程序中，识别对象种类的 .type 属性返回的是什么数据类型？",
            options: ["A. 整数 (int)", "B. 字符串 (string)", "C. 布尔值 (bool)", "D. 浮点数 (float)"],
            correct: 1,
            desc: ".type 属性返回带有双引号的文本内容，例如 \"munchkin\"。"
        },
        {
            q: "如果想在 C++ 中比较两个数值是否相等，应该使用哪个运算符？",
            options: ["A. =", "B. ==", "C. !=", "D. +="],
            correct: 1,
            desc: "== 用于比较两边的值是否相等，而单等号 = 是赋值运算符。"
        },
        {
            q: "获取敌人 y 坐标的正确代码路径是？",
            code: "auto enemy = hero.findNearestEnemy();\n// 在下方获取纵向位置",
            options: ["A. enemy.y", "B. enemy.pos.y", "C. enemy.pos.x", "D. enemy.pos"],
            correct: 1,
            desc: "坐标存放在 pos 属性中，所以需要通过 .pos.y 来访问。"
        },
        {
            q: "在 C++ 中，判断表达式 2 + 2 == 4 是否成立，结果会返回？",
            options: ["A. true", "B. false", "C. 4", "D. 0"],
            correct: 0,
            desc: "因为 2 + 2 等于 4，该比较表达式的结果为 true。"
        },
        {
            q: "观察这段拼接字符串的代码，英雄最后会说出什么格式的内容？",
            code: "hero.say(x + \",\" + y);",
            options: ["A. x,y", "B. x y", "C. x+y", "D. xy"],
            correct: 0,
            desc: "C++ 中使用 + 拼接变量与字符串 \",\"，结果会显示为 x,y 形式。"
        },
        {
            q: "下列哪项代码能正确判断敌人的类型是否为 \"burl\"？",
            options: ["A. if (enemy.type == \"burl\")", "B. if (enemy.type = \"burl\")", "C. if (enemy == \"burl\")", "D. if (enemy.type == burl)"],
            correct: 0,
            desc: "判断相等必须使用 ==，且字符串需要用双引号包裹。"
        },
        {
            q: "代码 if (enemy.type = \"munchkin\") 为什么是错误的写法？",
            options: ["A. 缺少分号", "B. 误用了赋值号 =", "C. 括号不对", "D. 类型不匹配"],
            correct: 1,
            desc: "在 C++ 中，= 是将右边的值赋给左边，判断相等必须用 ==。"
        },
        {
            q: "为了防止程序崩溃，在检查类型前通常先判断敌人是否存在，代码如下：",
            code: "auto enemy = hero.findNearestEnemy();\n_________ {\n    // 执行后续操作\n}",
            options: ["A. if (true)", "B. if (enemy)", "C. if (exist)", "D. if (enemy.type)"],
            correct: 1,
            desc: "if (enemy) 会检查 enemy 是否指向一个真实存在的敌人目标。"
        },
        {
            q: "如果有多种不同类型的敌人，我们应该如何处理逻辑？",
            code: "void dealEnemy(auto enemy) {\n    // 这里包含多个判断\n}",
            options: ["A. 使用多个 if 语句", "B. 只能用一个 if", "C. 忽略 type", "D. 使用 return"],
            correct: 0,
            desc: "可以使用多个独立的 if 语句来检查不同的 enemy.type。"
        },
        {
            q: "表达式 2 + 2 == 5 在 C++ 逻辑判断中的结果是？",
            options: ["A. true", "B. false", "C. 5", "D. null"],
            correct: 1,
            desc: "由于 2 + 2 不等于 5，所以这个逻辑判断的结果为 false。"
        }
    ];

    let currentQuestion = 0;
    let score = 0;
    let answered = false;

    function loadQuestion() {
        answered = false;
        document.getElementById('feedback-area').style.display = 'none';
        const data = quizData[currentQuestion];
        document.getElementById('level-indicator').innerText = `Level ${currentQuestion + 1} / ${quizData.length}`;
        document.getElementById('progress-bar').style.width = `${((currentQuestion) / quizData.length) * 100}%`;
        document.getElementById('score').innerText = score;

        let html = `<h2>${data.q}</h2>`;
        if (data.code) {
            let codeHtml = escapeHtml(data.code)
                .replace(/\b(int|return|void|auto|if|while|float|true|false)\b/g, '<span class="kw">$1</span>')
                .replace(/\b(hero|enemy)\b/g, '<span class="str">$1</span>')
                .replace(/\b(\d+)\b/g, '<span class="num">$1</span>')
                .replace(/(&quot;.*?&quot;)/g, '<span class="str">$1</span>')
                .replace(/(\/\/.*)/g, '<span class="cmt">$1</span>');
            html += `<div class="code-block">${codeHtml}</div>`;
        }
        document.getElementById('question-container').innerHTML = html;

        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        data.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.classList.add('option-btn');
            btn.onclick = () => checkAnswer(index, btn);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(selectedIndex, btnElement) {
        if (answered) return;
        answered = true;
        const data = quizData[currentQuestion];
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(btn => btn.setAttribute('disabled', 'true'));
        
        if (selectedIndex === data.correct) {
            btnElement.classList.add('correct');
            score += 100;
        } else {
            btnElement.classList.add('wrong');
            allBtns[data.correct].classList.add('correct');
        }
        showFeedback(selectedIndex === data.correct, data.desc);
    }

    function showFeedback(isCorrect, desc) {
        const area = document.getElementById('feedback-area');
        area.style.display = 'block';
        area.className = 'feedback-section ' + (isCorrect ? 'correct' : 'wrong');
        document.getElementById('feedback-title').innerText = isCorrect ? "🎉 正确！" : "❌ 错误";
        document.getElementById('explanation-text').innerText = desc;
    }

    function nextQuestion() {
        currentQuestion++;
        if (currentQuestion < quizData.length) {
            loadQuestion();
        } else {
            showEndScreen();
        }
    }

    function showEndScreen() {
        document.getElementById('quiz-view').style.display = 'none';
        const end = document.getElementById('end-screen');
        end.style.display = 'block';
        end.innerHTML = `<h1>挑战完成！</h1><div style="font-size:3rem; margin:20px;">⭐ ${score}</div><button class="next-btn" onclick="location.reload()" style="float:none;">再玩一次</button>`;
    }

    function escapeHtml(text) {
        return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    loadQuestion();
</script>
</body>
</html>

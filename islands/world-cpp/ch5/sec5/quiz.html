<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C++ 基础挑战：不等于运算符</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Fira+Code&display=swap" rel="stylesheet">
<style>
:root {
--primary-color: #6C5CE7;
--secondary-color: #A29BFE;
--bg-color: #DFE6E9;

--card-bg: #FFFFFF;
--text-color: #2D3436;

--correct-color: #00b894;
--wrong-color: #d63031;

--accent-yellow: #fdcb6e;

        /* 代码高亮 */
        --code-bg: #2d2d2d;
        --code-text: #ccc;
        --code-kw: #cc99cd;
        --code-fn: #6196cc;
        --code-num: #f08d49;
        --code-str: #7ec699;
        --code-cmt: #999;
    }

    body {
        font-family: 'Poppins', 'Microsoft YaHei', sans-serif;
        background-color: var(--bg-color);
        background-image: radial-gradient(#b2bec3 10%, transparent 10%);
        background-size: 20px 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
    }

    .game-container {
        background: var(--card-bg);
        width: 100%;
        max-width: 900px;
        border-radius: 25px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        padding: 40px;
        text-align: center;
        position: relative;
        border: 4px solid var(--secondary-color);
        overflow: hidden;
    }

    .header-stats {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--primary-color);
    }

    .score-box {
        background: var(--accent-yellow);
        padding: 8px 20px;
        border-radius: 30px;
        color: #fff;
        box-shadow: 0 4px 0 #e1b12c;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .progress-container {
        width: 100%;
        height: 12px;
        background-color: #ecf0f1;
        border-radius: 10px;
        margin-bottom: 35px;
        overflow: hidden;
    }
    .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--secondary-color), var(--primary-color));
        transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .question-area {
        text-align: left;
        margin-bottom: 30px;
    }
    
    .question-area h2 {
        color: var(--text-color);
        font-size: 1.4rem;
        line-height: 1.6;
        margin-bottom: 15px;
    }

    .code-block {
        background: var(--code-bg);
        color: var(--code-text);
        font-family: 'Fira Code', monospace;
	font-variant-ligatures: none;
        padding: 15px;
        border-radius: 10px;
        margin: 15px 0;
        white-space: pre-wrap;
        text-align: left;
        font-size: 1.05rem;
        border-left: 5px solid var(--secondary-color);
    }
    .kw { color: var(--code-kw); font-weight: bold; }
    .fn { color: var(--code-fn); }
    .num { color: var(--code-num); }
    .str { color: var(--code-str); }
    .cmt { color: var(--code-cmt); font-style: italic; }

    .options-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 15px;
    }
    @media (min-width: 600px) {
        .options-grid { grid-template-columns: 1fr 1fr; }
    }

    .option-btn {
        background: white;
        border: 3px solid #ecf0f1;
        padding: 18px 25px;
        border-radius: 18px;
        font-size: 1.05rem;
        font-family: inherit;
        cursor: pointer;
        transition: all 0.2s;
        color: var(--text-color);
        font-weight: 600;
        text-align: left;
        position: relative;
        box-shadow: 0 5px 0 #bdc3c7;
    }

    .option-btn:hover:not([disabled]) {
        border-color: var(--secondary-color);
        transform: translateY(-3px);
    }

    .option-btn:active:not([disabled]) {
        top: 5px;
        box-shadow: 0 0 0 #bdc3c7;
    }
    
    .option-btn.correct {
        background-color: var(--correct-color);
        color: white;
        border-color: var(--correct-color);
        box-shadow: 0 5px 0 #00965e;
    }

    .option-btn.wrong {
        background-color: var(--wrong-color);
        color: white;
        border-color: var(--wrong-color);
        box-shadow: 0 5px 0 #c0392b;
    }

    .feedback-section {
        display: none;
        text-align: left;
        background: #f1f2f6;
        padding: 25px;
        border-radius: 18px;
        margin-top: 30px;
        border-left: 6px solid;
    }
    .feedback-section.correct { border-color: var(--correct-color); }
    .feedback-section.wrong { border-color: var(--wrong-color); }

    .next-btn {
        background: var(--primary-color);
        color: white;
        border: none;
        padding: 12px 35px;
        border-radius: 50px;
        font-size: 1.1rem;
        font-family: inherit;
        font-weight: 600;
        cursor: pointer;
        margin-top: 20px;
        float: right;
        box-shadow: 0 5px 0 #5649c0;
    }

    .end-screen {
        display: none;
        padding: 20px 0;
    }
</style>
</head>
<body>

<div class="game-container">
    <div id="quiz-view">
        <div class="header-stats">
            <span id="level-indicator">Level 1 / 10</span>
            <div class="score-box">⭐ <span id="score">0</span></div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="question-area" id="question-container"></div>
        <div class="options-grid" id="options-container"></div>

        <div class="feedback-section" id="feedback-area">
            <div style="font-weight: 600; font-size: 1.2rem; margin-bottom: 10px;" id="feedback-title"></div>
            <div style="color: #636e72; line-height: 1.7;" id="explanation-text"></div>
            <button class="next-btn" onclick="nextQuestion()">下一题 ➔</button>
        </div>
    </div>

    <div id="end-screen" class="end-screen"></div>
</div>

<script>
    const quizData = [
        {
            q: "在 C++ 编程中，!= 被称为什么运算符？",
            options: ["A. 赋值运算符 (=)", "B. 相等运算符 (==)", "C. 不等于运算符 (!=)", "D. 逻辑与运算符 (&&)"],
            correct: 2,
            desc: "!= 就像一个检查官，用来判断两边的内容是否“不相同”。"
        },
        {
            q: "表达式 \"gem\" != \"poison\" 比较了两个不同的单词。这个表达式的计算结果是什么？",
            options: ["A. true", "B. false", "C. 找不到目标", "D. 会引发报错"],
            correct: 0,
            desc: "因为 gem 和 poison 确实是不同的单词，不等于的条件成立，所以返回 true。"
        },
        {
            q: "想要捡起地上除了宝石 (\"gem\") 以外的所有物品，下面哪个判断条件是正确的写法？",
            options: ["A. if (item.type == \"gem\")", "B. if (item.type != \"gem\")", "C. if (item != gem)", "D. if (item.type = \"gem\")"],
            correct: 1,
            desc: "使用 != 可以实现“排除法”，它表示：只要物品类型不是宝石，就执行大括号里的拿取代码。"
        },
        {
            q: "观察以下代码结构，空格处应该填入什么条件，才能实现“只攻击不是农民 (peon) 的敌人”？",
            code: "if (enemy) {\n    if (___) {\n        hero.attack(enemy);\n    }\n}",
            options: ["A. enemy.type == \"peon\"", "B. enemy.type = \"peon\"", "C. enemy.type != \"peon\"", "D. enemy != \"peon\""],
            correct: 2,
            desc: "要判断敌人类型，必须用 enemy.type；要表达不是农民，使用 != \"peon\"。"
        },
        {
            q: "如果 5 == 5 的判断结果是 true，那么 5 != 5 的判断结果是什么？",
            options: ["A. true", "B. false", "C. 5", "D. 0"],
            correct: 1,
            desc: "因为 5 和 5 是完全一样的，它们之间并不存在“不相等”的情况，所以 != 会返回 false。"
        },
        {
            q: "在收集物品时，如果不使用不等于运算符，想要捡起金币、铜币、蘑菇但避开宝石，通常会导致什么问题？",
            options: ["A. 代码运行速度变快", "B. 程序直接崩溃报错", "C. 需要写一堆很长的相等判断分支，代码变得复杂", "D. 英雄会自动变成无敌状态"],
            correct: 2,
            desc: "如果不使用排除法，你就必须用多个 if 分别判断物品是金币、铜币还是蘑菇，这会让代码变得非常冗长繁琐。"
        },
        {
            q: "当程序执行条件检查 if (enemy.type != \"burl\") 时，如果站在英雄面前的敌人恰好是一只树精 (\"burl\")，会发生什么？",
            options: ["A. 结果为 true，英雄会攻击它", "B. 结果为 false，英雄会忽略它并跳过大括号内的代码", "C. 英雄会立刻逃跑", "D. 程序会卡住"],
            correct: 1,
            desc: "由于面前的敌人是 burl，那么 burl 不等于 burl 这个说法是错的 (false)。条件不成立，大括号内的代码会被安全跳过。"
        },
        {
            q: "为什么我们在使用排除法判断类型之前，通常还要在外面先加上一层 if (item) 或 if (enemy) 的判断？",
            options: ["A. 为了让代码看起来更长", "B. 确保物品或敌人真实存在，防止读取空目标的类型而导致程序崩溃", "C. 这是固定格式，没有理由", "D. 为了增加游戏难度"],
            correct: 1,
            desc: "如果雷达没有扫描到敌人，enemy 就会为空。如果试图从一个空目标身上读取 type，程序就会直接崩溃。"
        },
        {
            q: "下面这段代码的目的是避开毒药 (\"poison\")。请问代码中的条件判断语句哪里写错了？",
            code: "auto item = hero.findNearestItem();\nif (item) {\n    if (item.type != poison) {\n        hero.moveXY(item.pos.x, item.pos.y);\n    }\n}",
            options: ["A. 忘记写分号了", "B. 移动指令写错了", "C. 毒药名称 poison 缺少了双引号", "D. 没有错，代码很完美"],
            correct: 2,
            desc: "在 C++ 中判断类型名称时，\"poison\" 作为一个字符串文本，必须用双引号包围起来。"
        },
        {
            q: "魔法师的口诀说：“!= 问不同”。那么对于表达式 10 != 5，它的最终计算结果是？",
            options: ["A. true (因为它们不同)", "B. false (因为它们相同)", "C. 10", "D. 5"],
            correct: 0,
            desc: "10 确实不等于 5，这个逻辑是正确的，因此结果返回 true。"
        }
    ];

    let currentQuestion = 0;
    let score = 0;
    let answered = false;

    function loadQuestion() {
        answered = false;
        document.getElementById('feedback-area').style.display = 'none';
        const data = quizData[currentQuestion];
        document.getElementById('level-indicator').innerText = `Level ${currentQuestion + 1} / ${quizData.length}`;
        document.getElementById('progress-bar').style.width = `${((currentQuestion) / quizData.length) * 100}%`;
        document.getElementById('score').innerText = score;

        let html = `<h2>${data.q}</h2>`;
        if (data.code) {
            let codeHtml = escapeHtml(data.code)
                .replace(/\b(int|return|void|auto|if|else|while|float|true|false)\b/g, '<span class="kw">$1</span>')
                .replace(/\b(hero|enemy|item)\b/g, '<span class="str">$1</span>')
                .replace(/\b(\d+)\b/g, '<span class="num">$1</span>')
                .replace(/(&quot;.*?&quot;)/g, '<span class="str">$1</span>')
                .replace(/(\/\/.*)/g, '<span class="cmt">$1</span>');
            html += `<div class="code-block">${codeHtml}</div>`;
        }
        document.getElementById('question-container').innerHTML = html;

        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        data.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.classList.add('option-btn');
            btn.onclick = () => checkAnswer(index, btn);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(selectedIndex, btnElement) {
        if (answered) return;
        answered = true;
        const data = quizData[currentQuestion];
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(btn => btn.setAttribute('disabled', 'true'));
        
        if (selectedIndex === data.correct) {
            btnElement.classList.add('correct');
            score += 100;
        } else {
            btnElement.classList.add('wrong');
            allBtns[data.correct].classList.add('correct');
        }
        showFeedback(selectedIndex === data.correct, data.desc);
    }

    function showFeedback(isCorrect, desc) {
        const area = document.getElementById('feedback-area');
        area.style.display = 'block';
        area.className = 'feedback-section ' + (isCorrect ? 'correct' : 'wrong');
        document.getElementById('feedback-title').innerText = isCorrect ? "🎉 回答正确！" : "❌ 回答错误";
        document.getElementById('explanation-text').innerText = desc;
    }

    function nextQuestion() {
        currentQuestion++;
        if (currentQuestion < quizData.length) {
            loadQuestion();
        } else {
            showEndScreen();
        }
    }

    function showEndScreen() {
        document.getElementById('quiz-view').style.display = 'none';
        const end = document.getElementById('end-screen');
        end.style.display = 'block';
        end.innerHTML = `<h1 style="color:var(--primary-color);">测试完成！</h1><div style="font-size:3rem; margin:20px;">⭐ 得分: ${score}</div><div style="color:#636e72; margin-bottom: 20px;">你已经完全掌握了 != 运算符和排除法的应用技巧！</div><button class="next-btn" onclick="location.reload()" style="float:none;">重新挑战</button>`;
    }

    function escapeHtml(text) {
        return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    loadQuestion();
</script>
</body>
</html>

<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C++ 基础挑战：逻辑运算符 NOT (!) 与优先级</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Fira+Code&display=swap" rel="stylesheet">
<style>
:root {
--primary-color: #6C5CE7;
--secondary-color: #A29BFE;
--bg-color: #DFE6E9;

--card-bg: #FFFFFF;
--text-color: #2D3436;

--correct-color: #00b894;
--wrong-color: #d63031;

--accent-yellow: #fdcb6e;

        /* 代码高亮 */
        --code-bg: #2d2d2d;
        --code-text: #ccc;
        --code-kw: #cc99cd;
        --code-fn: #6196cc;
        --code-num: #f08d49;
        --code-str: #7ec699;
        --code-cmt: #999;
    }

    body {
        font-family: 'Poppins', 'Microsoft YaHei', sans-serif;
        background-color: var(--bg-color);
        background-image: radial-gradient(#b2bec3 10%, transparent 10%);
        background-size: 20px 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
    }

    .game-container {
        background: var(--card-bg);
        width: 100%;
        max-width: 900px;
        border-radius: 25px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        padding: 40px;
        text-align: center;
        position: relative;
        border: 4px solid var(--secondary-color);
        overflow: hidden;
    }

    .header-stats {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--primary-color);
    }

    .score-box {
        background: var(--accent-yellow);
        padding: 8px 20px;
        border-radius: 30px;
        color: #fff;
        box-shadow: 0 4px 0 #e1b12c;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .progress-container {
        width: 100%;
        height: 12px;
        background-color: #ecf0f1;
        border-radius: 10px;
        margin-bottom: 35px;
        overflow: hidden;
    }
    .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--secondary-color), var(--primary-color));
        transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .question-area {
        text-align: left;
        margin-bottom: 30px;
    }
    
    .question-area h2 {
        color: var(--text-color);
        font-size: 1.4rem;
        line-height: 1.6;
        margin-bottom: 15px;
    }

    .code-block {
        background: var(--code-bg);
        color: var(--code-text);
        font-family: 'Fira Code', monospace;
        font-variant-ligatures: none; /* 关闭字体连字特效，防止符号变形 */
        padding: 15px;
        border-radius: 10px;
        margin: 15px 0;
        white-space: pre-wrap;
        text-align: left;
        font-size: 1.05rem;
        border-left: 5px solid var(--secondary-color);
    }
    .kw { color: var(--code-kw); font-weight: bold; }
    .fn { color: var(--code-fn); }
    .num { color: var(--code-num); }
    .str { color: var(--code-str); }
    .cmt { color: var(--code-cmt); font-style: italic; }

    .options-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 15px;
    }
    @media (min-width: 600px) {
        .options-grid { grid-template-columns: 1fr 1fr; }
    }

    .option-btn {
        background: white;
        border: 3px solid #ecf0f1;
        padding: 18px 25px;
        border-radius: 18px;
        font-size: 1.05rem;
        font-family: inherit;
        cursor: pointer;
        transition: all 0.2s;
        color: var(--text-color);
        font-weight: 600;
        text-align: left;
        position: relative;
        box-shadow: 0 5px 0 #bdc3c7;
    }

    .option-btn:hover:not([disabled]) {
        border-color: var(--secondary-color);
        transform: translateY(-3px);
    }

    .option-btn:active:not([disabled]) {
        top: 5px;
        box-shadow: 0 0 0 #bdc3c7;
    }
    
    .option-btn.correct {
        background-color: var(--correct-color);
        color: white;
        border-color: var(--correct-color);
        box-shadow: 0 5px 0 #00965e;
    }

    .option-btn.wrong {
        background-color: var(--wrong-color);
        color: white;
        border-color: var(--wrong-color);
        box-shadow: 0 5px 0 #c0392b;
    }

    .feedback-section {
        display: none;
        text-align: left;
        background: #f1f2f6;
        padding: 25px;
        border-radius: 18px;
        margin-top: 30px;
        border-left: 6px solid;
    }
    .feedback-section.correct { border-color: var(--correct-color); }
    .feedback-section.wrong { border-color: var(--wrong-color); }

    .next-btn {
        background: var(--primary-color);
        color: white;
        border: none;
        padding: 12px 35px;
        border-radius: 50px;
        font-size: 1.1rem;
        font-family: inherit;
        font-weight: 600;
        cursor: pointer;
        margin-top: 20px;
        float: right;
        box-shadow: 0 5px 0 #5649c0;
    }

    .end-screen {
        display: none;
        padding: 20px 0;
    }
</style>
</head>
<body>

<div class="game-container">
    <div id="quiz-view">
        <div class="header-stats">
            <span id="level-indicator">Level 1 / 10</span>
            <div class="score-box">⭐ <span id="score">0</span></div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="question-area" id="question-container"></div>
        <div class="options-grid" id="options-container"></div>

        <div class="feedback-section" id="feedback-area">
            <div style="font-weight: 600; font-size: 1.2rem; margin-bottom: 10px;" id="feedback-title"></div>
            <div style="color: #636e72; line-height: 1.7;" id="explanation-text"></div>
            <button class="next-btn" onclick="nextQuestion()">下一题 ➔</button>
        </div>
    </div>

    <div id="end-screen" class="end-screen"></div>
</div>

<script>
    const quizData = [
        {
            q: "在 C++ 中，逻辑运算符 NOT 是用什么符号表示的？",
            options: ["A. ?", "B. !", "C. ~", "D. NOT"],
            correct: 1,
            desc: "在 C++ 中，感叹号 ! 就是逻辑运算符 NOT，它就像一面魔法镜子，起到反向器的作用。"
        },
        {
            q: "逻辑运算符 ! (NOT) 的主要作用是什么？",
            options: ["A. 把真 (true) 变成假 (false)，把假变成真", "B. 强制让条件变为真", "C. 停止程序的运行", "D. 增加变量的值"],
            correct: 0,
            desc: "口诀说：“! (NOT) 是反向器，黑白颠倒全靠它”。它会把布尔值完全反转。"
        },
        {
            q: "如果变量 `is_raining` 的值是 `true`，那么表达式 `!is_raining` 的计算结果是什么？",
            code: "bool is_raining = true;\nbool can_go_out = !is_raining;",
            options: ["A. true", "B. false", "C. null", "D. 报错"],
            correct: 1,
            desc: "因为 is_raining 是 true，加上 ! 反转后，结果就变成了 false。"
        },
        {
            q: "根据逻辑运算的优先级阶梯，下面哪一个拥有【最高】的优先级？",
            options: ["A. 逻辑与 (&&)", "B. 逻辑或 (||)", "C. 逻辑非 (!)", "D. 括号 ()"],
            correct: 3,
            desc: "括号 () 拥有绝对的最高优先级！口诀提醒我们：“括号保平安，优先级高最优先！”"
        },
        {
            q: "在没有括号的情况下，C++ 会按照什么顺序计算下面的逻辑运算符？",
            options: ["A. 先算 ||，再算 &&，最后算 !", "B. 从左到右依次计算", "C. 先算 !，再算 &&，最后算 ||", "D. 随机计算"],
            correct: 2,
            desc: "正确的优先级阶梯是：1. 括号() -> 2. 非(!) -> 3. 与(&&) -> 4. 或(||)。"
        },
        {
            q: "在代码 `if (enemy && enemy.type == \"munchkin\")` 中，利用了 `&&` 的什么特性来防止程序报错？",
            options: ["A. 并联特性", "B. 短路特性 (Short-Circuit Evaluation)", "C. 循环特性", "D. 自动回血特性"],
            correct: 1,
            desc: "这是短路逻辑。如果左边的 enemy 不存在 (false)，C++ 就不会去检查右边的 type，从而避免了“在空目标上找类型”的崩溃报错。"
        },
        {
            q: "如果将多个条件用 AND 连成一串，例如 `A && B && C`，在什么情况下整体结果才是 `true`？",
            options: ["A. 只要 A 是 true", "B. 只要其中任意一个是 true", "C. 必须 A、B、C 全部都是 true", "D. 只要 C 是 true"],
            correct: 2,
            desc: "AND (&&) 就像串联电路，只有当所有相连的条件都满足（全部为 true），总结果才能通过。"
        },
        {
            q: "如果将多个条件用 OR 连成一串，例如 `A || B || C`，在什么情况下整体结果就是 `true`？",
            options: ["A. 只要其中任意一个是 true", "B. 必须全部都是 true", "C. 只有第一个是 true 时", "D. 永远是 false"],
            correct: 0,
            desc: "OR (||) 是多选一逻辑，只要这串条件里有哪怕一个满足了 (true)，总结果就是 true。"
        },
        {
            q: "根据运算符优先级，表达式 `A || B && C` 在 C++ 中会先计算哪一部分？",
            options: ["A. 先计算 A || B", "B. 先计算 B && C", "C. 同时计算", "D. 会报错，必须加括号"],
            correct: 1,
            desc: "因为 && (AND) 的优先级高于 || (OR)，所以 C++ 会优先将 B 和 C 进行 && 运算，这就等同于 `A || (B && C)`。"
        },
        {
            q: "请计算这个表达式的最终结果：`!true || true`",
            options: ["A. true", "B. false", "C. 1", "D. 0"],
            correct: 0,
            desc: "首先计算优先级最高的 !true，结果变为 false。接着计算 false || true，因为 || 只要有一边为真即为真，所以最终结果是 true。"
        }
    ];

    let currentQuestion = 0;
    let score = 0;
    let answered = false;

    function loadQuestion() {
        answered = false;
        document.getElementById('feedback-area').style.display = 'none';
        const data = quizData[currentQuestion];
        document.getElementById('level-indicator').innerText = `Level ${currentQuestion + 1} / ${quizData.length}`;
        document.getElementById('progress-bar').style.width = `${((currentQuestion) / quizData.length) * 100}%`;
        document.getElementById('score').innerText = score;

        let html = `<h2>${data.q}</h2>`;
        if (data.code) {
            let codeHtml = escapeHtml(data.code)
                .replace(/\b(int|return|void|auto|if|else|while|float|true|false|bool)\b/g, '<span class="kw">$1</span>')
                .replace(/\b(hero|enemy|item|is_raining|can_go_out|A|B|C|secretA|secretB)\b/g, '<span class="str">$1</span>')
                .replace(/\b(\d+)\b/g, '<span class="num">$1</span>')
                .replace(/(&quot;.*?&quot;)/g, '<span class="str">$1</span>')
                .replace(/(\/\/.*)/g, '<span class="cmt">$1</span>');
            html += `<div class="code-block">${codeHtml}</div>`;
        }
        document.getElementById('question-container').innerHTML = html;

        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        data.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.classList.add('option-btn');
            btn.onclick = () => checkAnswer(index, btn);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(selectedIndex, btnElement) {
        if (answered) return;
        answered = true;
        const data = quizData[currentQuestion];
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(btn => btn.setAttribute('disabled', 'true'));
        
        if (selectedIndex === data.correct) {
            btnElement.classList.add('correct');
            score += 100;
        } else {
            btnElement.classList.add('wrong');
            allBtns[data.correct].classList.add('correct');
        }
        showFeedback(selectedIndex === data.correct, data.desc);
    }

    function showFeedback(isCorrect, desc) {
        const area = document.getElementById('feedback-area');
        area.style.display = 'block';
        area.className = 'feedback-section ' + (isCorrect ? 'correct' : 'wrong');
        document.getElementById('feedback-title').innerText = isCorrect ? "🎉 回答正确！" : "❌ 回答错误";
        document.getElementById('explanation-text').innerText = desc;
    }

    function nextQuestion() {
        currentQuestion++;
        if (currentQuestion < quizData.length) {
            loadQuestion();
        } else {
            showEndScreen();
        }
    }

    function showEndScreen() {
        document.getElementById('quiz-view').style.display = 'none';
        const end = document.getElementById('end-screen');
        end.style.display = 'block';
        end.innerHTML = `<h1 style="color:var(--primary-color);">逻辑考核完成！</h1><div style="font-size:3rem; margin:20px;">⭐ 得分: ${score}</div><div style="color:#636e72; margin-bottom: 20px;">恭喜！你已经掌握了逻辑运算符 NOT (!) 与复杂的优先级规则！</div><button class="next-btn" onclick="location.reload()" style="float:none;">重新挑战</button>`;
    }

    function escapeHtml(text) {
        return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    loadQuestion();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ 基础挑战：事件处理机制 (PetOS)</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        /* --- 1. 基础设置 (PetOS Theme) --- */
        :root {
            --bg-park: #7bed9f;        /* 草地绿 */
            --device-bg: #f1f2f6;      /* 设备灰白 */
            --primary: #ffa502;        /* 活力橙 */
            --secondary: #3742fa;      /* 科技蓝 */
            --accent: #ff4757;         /* 强调红 */
            --text-main: #2f3542;
            --correct-color: #2ed573;
            --wrong-color: #ff4757;
            
            /* C++ 代码高亮 */
            --code-bg: #2f3640;
            --code-fg: #dfe4ea;
            --tok-kw: #ff6b81;         
            --tok-func: #70a1ff;       
            --tok-str: #7bed9f;        
            --tok-prop: #a4b0be;       
            --tok-num: #eccc68;        
            --tok-cm: #747d8c;         
            --tok-var: #ced6e0;        
        }

        body {
            margin: 0; padding: 20px;
            font-family: 'Segoe UI', 'Consolas', sans-serif;
            background-color: var(--bg-park);
            background-image: 
                radial-gradient(#2ed573 15%, transparent 16%),
                radial-gradient(#2ed573 15%, transparent 16%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            color: var(--text-main);
            overflow: hidden;
        }

        /* 漂浮装饰 */
        .decoration {
            position: absolute; font-size: 40px; opacity: 0.5;
            animation: floatDeco 12s infinite linear; pointer-events: none;
            z-index: 0;
        }
        @keyframes floatDeco {
            0% { transform: translate(-100px, 100vh) rotate(0deg); }
            100% { transform: translate(100vw, -100px) rotate(360deg); }
        }

        /* --- 2. 游戏容器 (交流器风格) --- */
        .communicator-container {
            width: 100%; max-width: 960px; 
            background: var(--device-bg); border-radius: 40px;
            border: 12px solid #fff;
            box-shadow: 0 0 0 5px #dcdde1, 0 30px 60px rgba(0,0,0,0.3);
            position: relative; z-index: 10;
            overflow: hidden;
            display: flex; flex-direction: column;
            background-image: radial-gradient(#ced6e0 2px, transparent 2px); 
            background-size: 20px 20px;
        }

        /* 顶部状态栏 */
        .status-bar {
            height: 55px; background: #dfe4ea; display: flex; justify-content: space-between;
            align-items: center; padding: 0 30px; color: var(--text-main);
            font-family: 'Consolas', monospace; font-weight: bold; font-size: 18px;
            border-bottom: 2px solid #ced6e0; background-color: #fff;
        }
        .signal-icon { color: #2ed573; animation: blink 2s infinite; font-size: 20px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* 进度条 */
        .progress-container { width: 100%; height: 8px; background-color: #ced6e0; }
        .progress-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* --- 3. 题目区域 --- */
        .quiz-content { padding: 35px 50px; position: relative; flex: 1; background: rgba(255,255,255,0.7); }

        .question-area h2 {
            color: var(--text-main); font-size: 1.4rem; line-height: 1.6; margin-top: 0; margin-bottom: 20px;
            font-weight: 800;
        }

        /* C++ 代码高亮 */
        .code-block {
            background: var(--code-bg); color: var(--code-fg); padding: 18px 20px; border-radius: 10px;
            font-family: 'Fira Code', 'Consolas', monospace; font-size: 1.05rem; margin: 20px 0;
            border-left: 6px solid var(--secondary); box-shadow: 5px 5px 15px rgba(0,0,0,0.15);
            white-space: pre-wrap; line-height: 1.5; font-variant-ligatures: none;
        }
        .k { color: var(--tok-kw); font-weight: bold; } 
        .f { color: var(--tok-func); } 
        .v { color: var(--tok-var); } 
        .p { color: var(--tok-prop); } 
        .n { color: var(--tok-num); } 
        .s { color: var(--tok-str); }
        .c { color: var(--tok-cm); font-style: italic; } 

        /* 选项按钮 */
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 600px) { .options-grid { grid-template-columns: 1fr 1fr; } }

        .option-btn {
            background: #fff; border: 3px solid #dfe4ea;
            padding: 16px 20px; border-radius: 15px; font-size: 1.05rem; color: var(--text-main);
            cursor: pointer; transition: all 0.2s; text-align: left;
            font-family: inherit; font-weight: bold; box-shadow: 0 4px 0 #ced6e0;
        }
        .option-btn:hover:not([disabled]) {
            border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 6px 0 #ffa502;
        }
        .option-btn:active:not([disabled]) { transform: translateY(4px); box-shadow: none; }
        
        .option-btn.correct {
            background: #f1fcf5; border-color: var(--correct-color); color: #218c53; box-shadow: 0 4px 0 #2ed573;
        }
        .option-btn.wrong {
            background: #fff0f1; border-color: var(--wrong-color); color: #c0392b; box-shadow: 0 4px 0 #ff4757;
        }

        /* 解析区域 */
        .feedback-section {
            display: none; text-align: left; background: #fff;
            padding: 20px; border-radius: 15px; margin-top: 25px;
            border-left: 6px solid; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .feedback-section.correct { border-color: var(--correct-color); }
        .feedback-section.wrong { border-color: var(--wrong-color); }

        .feedback-title { font-weight: 800; font-size: 1.2rem; margin-bottom: 8px; }
        .correct .feedback-title { color: var(--correct-color); }
        .wrong .feedback-title { color: var(--wrong-color); }
        .explanation-text { color: #57606f; line-height: 1.6; font-weight: 600; }

        /* 下一题按钮 */
        .next-btn {
            background: var(--primary); color: white; border: none;
            padding: 12px 35px; border-radius: 30px; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; margin-top: 20px; float: right; transition: all 0.2s;
            box-shadow: 0 5px 0 #e58e26; border: 2px solid #e1b12c;
        }
        .next-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .next-btn:active { transform: translateY(4px); box-shadow: none; }

        /* 结束画面 */
        .end-screen { display: none; padding: 60px 0; text-align: center; }
        .end-title { font-size: 2.8rem; color: var(--text-main); margin-bottom: 10px; font-weight: 800; }
        .end-score-box {
            background: #fff7d1; border-left: 6px solid var(--primary);
            color: #e58e26; padding: 25px 50px; border-radius: 0 20px 20px 0; display: inline-block;
            margin: 30px 0; box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
        }
        .end-score { font-size: 4rem; font-weight: bold; line-height: 1; }
    </style>
</head>
<body>

    <script>
        const decos = ['🐾', '☁️', '🦴', '🎾'];
        for(let i=0; i<8; i++) {
            let s = document.createElement('div');
            s.className = 'decoration';
            s.innerText = decos[Math.floor(Math.random() * decos.length)];
            s.style.left = Math.random() * 100 + 'vw';
            s.style.top = Math.random() * 100 + 'vh';
            s.style.animationDelay = Math.random() * 10 + 's';
            document.body.appendChild(s);
        }
    </script>

    <div class="communicator-container">
        <div class="status-bar">
            <div style="display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 22px;">🐶</span>
                <span>PetOS v3.0 | TEST <span id="level-indicator">01/10</span></span>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <span>SCORE: <span id="score" style="color:var(--primary);">0</span></span>
                <span class="signal-icon">●</span>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="quiz-content" id="quiz-view">
            <div class="question-area" id="question-container"></div>
            <div class="options-grid" id="options-container"></div>

            <div class="feedback-section" id="feedback-area">
                <div class="feedback-title" id="feedback-title"></div>
                <div class="explanation-text" id="explanation-text"></div>
                <div style="overflow: hidden;"><button class="next-btn" onclick="nextQuestion()">下一题 ➔</button></div>
            </div>
        </div>

        <div class="quiz-content end-screen" id="end-screen"></div>
    </div>

    <script>
        // 知识点：pet.on, parallel, findNearestByType, fetch, onHear, event.speaker, event.message
        const quizData = [
            {
                q: "什么是事件处理器 (Event Handler)？",
                options: ["A. 程序的“耳朵”，一旦听到特定信号就立刻行动", "B. 游戏结束的标志", "C. 一个存放物品的背包", "D. 控制英雄血量的代码"],
                correct: 0,
                desc: "事件处理器就像程序的耳朵，它一直后台监听，当特定事件（如出生、听到声音）发生时，就会触发对应的动作。"
            },
            {
                q: "想要让宠物在“出生 (spawn)”时，立刻执行名叫 petMove 的动作函数，应该怎么注册事件？",
                code: "void petMove(auto event) {\n    pet.moveXY(50, 21);\n}\n\n// 在下方注册事件\n______________________",
                options: ["A. pet.on(\"spawn\", petMove);", "B. pet.on(spawn);", "C. pet.moveXY(\"spawn\");", "D. pet.spawn(\"on\", petMove);"],
                correct: 0,
                desc: "pet.on(事件名称, 动作函数) 是绑定信号与动作的核心语句。这里是绑定了 spawn 事件和 petMove 函数。"
            },
            {
                q: "在事件驱动机制中，宠物（pet）和英雄（hero）的行动有什么特点？",
                options: ["A. 英雄必须等宠物走完才能走", "B. 宠物必须等英雄走完才能走", "C. 宠物和英雄可以同时/并行行动", "D. 宠物不能移动，只能叫"],
                correct: 2,
                desc: "因为事件是由系统后台监听触发的，所以宠物响应事件移动的同时，主程序里的英雄也可以移动，实现了并行。"
            },
            {
                q: "宠物想把地上的一瓶药水捡起来带给英雄，应该使用哪一个专用的动作函数？",
                code: "auto potion = pet.findNearestByType(\"potion\");\nif (potion) {\n    ______________ // 捡起药水\n}",
                options: ["A. pet.attack(potion);", "B. pet.moveXY(potion);", "C. pet.say(potion);", "D. pet.fetch(potion);"],
                correct: 3,
                desc: "fetch 是宠物专属的“拾取/找回”指令，专门用来跑过去叼起物品并带回来。"
            },
            {
                q: "当宠物使用 onHear 函数监听到声音时，传入的 event 参数里面包含了哪些关键信息？",
                options: ["A. 只有说话的内容", "B. 只有说话人的名字", "C. 说话的人 (speaker) 和说话的内容 (message)", "D. 声音的音量大小"],
                correct: 2,
                desc: "听觉事件参数 event 包含 event.speaker（谁说的）和 event.message（说了什么）这两个重要属性。"
            },
            {
                q: "如果你想知道刚才说话的人是谁，应该读取代码中的哪个属性？",
                options: ["A. event.message", "B. event.speaker", "C. event.type", "D. event.name"],
                correct: 1,
                desc: "speaker 的意思是“说话者”，通过 event.speaker 可以获取到是谁发出了这个声音。"
            },
            {
                q: "以下代码的作用是什么？",
                code: "if (event.message == \"North\") {\n    pet.say(\"Htron\");\n}",
                options: ["A. 判断宠物是不是站在北方", "B. 判断说话的人叫不叫 North", "C. 只有当听到的具体内容是 \"North\" 时，宠物才回答", "D. 让宠物向北移动"],
                correct: 2,
                desc: "event.message 代表说话的内容，这句话的意思是：如果听到的词恰好是 \"North\"，就执行后面的回答。"
            },
            {
                q: "为了让宠物**只听裁判 (referee) 的话**而忽略敌人，我们在 if 条件中加入了身份识别，空缺处应该填什么？",
                code: "auto referee = pet.findNearestByType(\"wizard\");\nif (___________ == referee && event.message == \"Start\") {\n    pet.moveXY(53, 27);\n}",
                options: ["A. event.message", "B. event.type", "C. event.speaker", "D. event.health"],
                correct: 2,
                desc: "我们需要把“说话的人 (event.speaker)”和“裁判 (referee)”进行对比，确保发出命令的是裁判。"
            },
            {
                q: "在定义事件处理器函数时，括号里必须带有一个特殊的参数来接收事件信息，这个参数通常写成什么？",
                options: ["A. auto time", "B. auto event", "C. auto hero", "D. int count"],
                correct: 1,
                desc: "通常写为 void onHear(auto event)，这个 event 参数就像一个包裹，里面装满了触发事件时的相关数据。"
            },
            {
                q: "训练师的“总结秘籍”中提到，绑定信号与动作的核心语句是哪一句？",
                options: ["A. pet.on(事件, 函数)", "B. pet.fetch(物品)", "C. event.message", "D. main()"],
                correct: 0,
                desc: "pet.on() 是整个事件处理机制的桥梁，它负责告诉宠物：“当你听到这个事件时，就去执行这个函数”。"
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false;

        function loadQuestion() {
            answered = false;
            document.getElementById('feedback-area').style.display = 'none';
            const data = quizData[currentQuestion];
            
            document.getElementById('level-indicator').innerText = `0${currentQuestion + 1}`.slice(-2) + ` / ${quizData.length}`;
            document.getElementById('progress-bar').style.width = `${((currentQuestion) / quizData.length) * 100}%`;
            document.getElementById('score').innerText = score;

            let html = `<h2>${data.q}</h2>`;
            if (data.code) {
                let codeHtml = escapeHtml(data.code)
                    .replace(/\b(int|float|void|auto|if|else|while|break|continue|true|false)\b/g, '<span class="k">$1</span>')
                    .replace(/\b(moveXY|findNearestByType|fetch|say|on)\b/g, '<span class="f">$1</span>')
                    .replace(/\b(hero|pet|event|potion|referee)\b/g, '<span class="v">$1</span>')
                    .replace(/(\.message|\.speaker|\.type|\.pos|\.x|\.y)\b/g, '<span class="p">$1</span>')
                    .replace(/\b(\d+)\b/g, '<span class="n">$1</span>')
                    .replace(/(&quot;.*?&quot;)/g, '<span class="s">$1</span>')
                    .replace(/(\/\/.*)/g, '<span class="c">$1</span>');
                html += `<div class="code-block">${codeHtml}</div>`;
            }
            document.getElementById('question-container').innerHTML = html;

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.classList.add('option-btn');
                btn.onclick = () => checkAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex, btnElement) {
            if (answered) return;
            answered = true;
            const data = quizData[currentQuestion];
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(btn => btn.setAttribute('disabled', 'true'));
            
            if (selectedIndex === data.correct) {
                btnElement.classList.add('correct');
                score += 100;
                document.getElementById('score').innerText = score;
            } else {
                btnElement.classList.add('wrong');
                allBtns[data.correct].classList.add('correct');
            }
            showFeedback(selectedIndex === data.correct, data.desc);
        }

        function showFeedback(isCorrect, desc) {
            const area = document.getElementById('feedback-area');
            area.style.display = 'block';
            area.className = 'feedback-section ' + (isCorrect ? 'correct' : 'wrong');
            document.getElementById('feedback-title').innerText = isCorrect ? "🐾 判定成功" : "⚠️ 判定失败";
            document.getElementById('explanation-text').innerText = desc;
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                loadQuestion();
            } else {
                showEndScreen();
            }
        }

        function showEndScreen() {
            document.getElementById('quiz-view').style.display = 'none';
            document.getElementById('progress-bar').style.width = `100%`;
            
            const end = document.getElementById('end-screen');
            end.style.display = 'block';
            
            let message = score === quizData.length * 100 ? "优秀！你已经成为顶级的 PetOS 事件驯兽师！🐶" : "干得不错！再熟悉一下事件参数，你可以做得更好。";
            
            end.innerHTML = `
                <div class="end-title">🎉 测试完成</div>
                <div class="end-score-box">
                    <div style="font-size:1.2rem; margin-bottom:10px; color:#a4b0be; font-weight: bold;">FINAL SCORE</div>
                    <div class="end-score">${score}</div>
                </div>
                <div style="color:var(--text-main); font-size:1.2rem; margin-bottom: 30px; font-weight: bold;">${message}</div>
                <button class="next-btn" onclick="location.reload()" style="float:none;">重新挑战</button>
            `;
        }

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }

        // 启动测试
        loadQuestion();
    </script>
</body>
</html>

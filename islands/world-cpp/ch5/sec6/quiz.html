<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ 基础挑战：逻辑运算符 OR (||)</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6C5CE7; 
            --secondary-color: #A29BFE;
            --bg-color: #DFE6E9;     
            --card-bg: #FFFFFF;
            --text-color: #2D3436;   
            --correct-color: #00b894;
            --wrong-color: #d63031;  
            --accent-yellow: #fdcb6e;
            
            /* 代码高亮 */
            --code-bg: #2d2d2d;
            --code-text: #ccc;
            --code-kw: #cc99cd;
            --code-fn: #6196cc;
            --code-num: #f08d49;
            --code-str: #7ec699;
            --code-cmt: #999;
        }

        body {
            font-family: 'Poppins', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#b2bec3 10%, transparent 10%);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 900px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 40px;
            text-align: center;
            position: relative;
            border: 4px solid var(--secondary-color);
            overflow: hidden;
        }

        .header-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary-color);
        }

        .score-box {
            background: var(--accent-yellow);
            padding: 8px 20px;
            border-radius: 30px;
            color: #fff;
            box-shadow: 0 4px 0 #e1b12c;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .progress-container {
            width: 100%;
            height: 12px;
            background-color: #ecf0f1;
            border-radius: 10px;
            margin-bottom: 35px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--secondary-color), var(--primary-color));
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .question-area {
            text-align: left;
            margin-bottom: 30px;
        }
        
        .question-area h2 {
            color: var(--text-color);
            font-size: 1.4rem;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .code-block {
            background: var(--code-bg);
            color: var(--code-text);
            font-family: 'Fira Code', monospace;
            font-variant-ligatures: none; /* 关闭字体连字特效，防止符号变形 */
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            white-space: pre-wrap;
            text-align: left;
            font-size: 1.05rem;
            border-left: 5px solid var(--secondary-color);
        }
        .kw { color: var(--code-kw); font-weight: bold; }
        .fn { color: var(--code-fn); }
        .num { color: var(--code-num); }
        .str { color: var(--code-str); }
        .cmt { color: var(--code-cmt); font-style: italic; }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        @media (min-width: 600px) {
            .options-grid { grid-template-columns: 1fr 1fr; }
        }

        .option-btn {
            background: white;
            border: 3px solid #ecf0f1;
            padding: 18px 25px;
            border-radius: 18px;
            font-size: 1.05rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-color);
            font-weight: 600;
            text-align: left;
            position: relative;
            box-shadow: 0 5px 0 #bdc3c7;
        }

        .option-btn:hover:not([disabled]) {
            border-color: var(--secondary-color);
            transform: translateY(-3px);
        }

        .option-btn:active:not([disabled]) {
            top: 5px;
            box-shadow: 0 0 0 #bdc3c7;
        }
        
        .option-btn.correct {
            background-color: var(--correct-color);
            color: white;
            border-color: var(--correct-color);
            box-shadow: 0 5px 0 #00965e;
        }

        .option-btn.wrong {
            background-color: var(--wrong-color);
            color: white;
            border-color: var(--wrong-color);
            box-shadow: 0 5px 0 #c0392b;
        }

        .feedback-section {
            display: none;
            text-align: left;
            background: #f1f2f6;
            padding: 25px;
            border-radius: 18px;
            margin-top: 30px;
            border-left: 6px solid;
        }
        .feedback-section.correct { border-color: var(--correct-color); }
        .feedback-section.wrong { border-color: var(--wrong-color); }

        .next-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            float: right;
            box-shadow: 0 5px 0 #5649c0;
        }

        .end-screen {
            display: none;
            padding: 20px 0;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div id="quiz-view">
            <div class="header-stats">
                <span id="level-indicator">Level 1 / 10</span>
                <div class="score-box">⭐ <span id="score">0</span></div>
            </div>

            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>

            <div class="question-area" id="question-container"></div>
            <div class="options-grid" id="options-container"></div>

            <div class="feedback-section" id="feedback-area">
                <div style="font-weight: 600; font-size: 1.2rem; margin-bottom: 10px;" id="feedback-title"></div>
                <div style="color: #636e72; line-height: 1.7;" id="explanation-text"></div>
                <button class="next-btn" onclick="nextQuestion()">下一题 ➔</button>
            </div>
        </div>

        <div id="end-screen" class="end-screen"></div>
    </div>

    <script>
        const quizData = [
            {
                q: "在 C++ 程序中，用来表示逻辑“或” (OR) 的符号是什么？",
                options: ["A. &&", "B. ||", "C. !=", "D. =="],
                correct: 1,
                desc: "在 C++ 中，|| 是逻辑“或”运算符。通常可以通过按住 Shift 加上回车键上方的反斜杠键（\\）来输入双竖线。"
            },
            {
                q: "关于逻辑 OR (||)，教程中使用了什么来比喻它？",
                options: ["A. 串联电路（必须全部连通）", "B. 齿轮组（必须全部咬合）", "C. 并联电路（只要有一条路通就可以）", "D. 断路器（必须全部断开）"],
                correct: 2,
                desc: "|| 就像并联电路，只要有多条通路中的任何一条（一个条件）是通的，总结果就是 true。"
            },
            {
                q: "在布尔逻辑中，表达式 false || true 的最终判断结果是什么？",
                options: ["A. true", "B. false", "C. null", "D. 程序报错"],
                correct: 0,
                desc: "在 || 运算中，两边只要有一边是 true，整体结果就是 true。"
            },
            {
                q: "在什么情况下，使用 || 连接的条件最终结果才会是 false？",
                options: ["A. 只要有一边是 false 的时候", "B. 只有当两边都是 false 的时候", "C. 两边都是 true 的时候", "D. 永远不会是 false"],
                correct: 1,
                desc: "只有当所有条件都不满足（即 false || false）时，总结果才是 false。其他任何情况全为 true。"
            },
            {
                q: "如果一个逻辑表达式是 2 + 2 == 5 || 3 == 3，它的整体判断结果是什么？",
                options: ["A. true", "B. false", "C. 5", "D. 3"],
                correct: 0,
                desc: "哪怕 2 + 2 == 5 是错的 (false)，但因为 3 == 3 是对的 (true)，根据多选一原则，只要有一个对，整体结果就是 true。"
            },
            {
                q: "想要实现“如果敌人是 munchkin 或者 thrower 就发起攻击”，正确的 C++ 写法是？",
                options: ["A. enemy.type == \"munchkin\" || \"thrower\"", "B. enemy == \"munchkin\" || \"thrower\"", "C. enemy.type == \"munchkin\" || enemy.type == \"thrower\"", "D. enemy.type == munchkin || thrower"],
                correct: 2,
                desc: "在 C++ 中，不能简写成 == \"munchkin\" || \"thrower\"。必须完整地写出两边的变量比较："
            },
            {
                q: "在代码逻辑中，我们需要“收集宝石 (gem) 或者距离小于 20 米的物品”。以下哪种条件符合这个要求？",
                options: ["A. item.type == \"gem\" || dist < 20", "B. item.type == \"gem\" && dist < 20", "C. item.type != \"gem\" || dist > 20", "D. item.type = \"gem\" || dist < 20"],
                correct: 0,
                desc: "收集宝石 (item.type == \"gem\") 或者 (||) 距离很近 (dist < 20)。两者满足其一即可拿取。"
            },
            {
                q: "在 C++ 中，什么是“布尔值” (Boolean)？",
                options: ["A. 带有小数点的数字", "B. 一段由双引号包围的文字", "C. 只有 true (真) 和 false (假) 两种状态的值", "D. 一种特殊的运算符"],
                correct: 2,
                desc: "布尔值 (Boolean) 就像灯泡开关的开和关，只存在 true (真) 和 false (假) 两个固定值。"
            },
            {
                q: "逻辑口诀中，“|| (OR) 是多选一，只要一个对，大门就____”？",
                options: ["A. 锁死", "B. 打开", "C. 消失", "D. 爆炸"],
                correct: 1,
                desc: "|| 的核心精神是多选一，只要其中一个条件是对的，大门就打开（程序就会执行大括号里面的代码）。"
            },
            {
                q: "在森林影子关卡的综合练习中，为什么我们要先确认 if (enemy)，然后再在里面写包含 || 的类型判断？",
                options: ["A. 为了让代码行数变得更多", "B. 确保雷达确实扫到了敌人，防止在空目标上读取类型导致程序崩溃", "C. C++ 规定不能直接写 ||", "D. 没有理由，只是为了好看"],
                correct: 1,
                desc: "第一层 if (enemy) 是安全检查。如果雷达没扫描到任何东西，强行去读取不存在目标的类型（enemy.type）会导致程序报错崩溃。"
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false;

        function loadQuestion() {
            answered = false;
            document.getElementById('feedback-area').style.display = 'none';
            const data = quizData[currentQuestion];
            document.getElementById('level-indicator').innerText = `Level ${currentQuestion + 1} / ${quizData.length}`;
            document.getElementById('progress-bar').style.width = `${((currentQuestion) / quizData.length) * 100}%`;
            document.getElementById('score').innerText = score;

            let html = `<h2>${data.q}</h2>`;
            if (data.code) {
                let codeHtml = escapeHtml(data.code)
                    .replace(/\b(int|return|void|auto|if|else|while|float|true|false)\b/g, '<span class="kw">$1</span>')
                    .replace(/\b(hero|enemy|item|dist|x)\b/g, '<span class="str">$1</span>')
                    .replace(/\b(\d+)\b/g, '<span class="num">$1</span>')
                    .replace(/(&quot;.*?&quot;)/g, '<span class="str">$1</span>')
                    .replace(/(\/\/.*)/g, '<span class="cmt">$1</span>');
                html += `<div class="code-block">${codeHtml}</div>`;
            }
            document.getElementById('question-container').innerHTML = html;

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.classList.add('option-btn');
                btn.onclick = () => checkAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex, btnElement) {
            if (answered) return;
            answered = true;
            const data = quizData[currentQuestion];
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(btn => btn.setAttribute('disabled', 'true'));
            
            if (selectedIndex === data.correct) {
                btnElement.classList.add('correct');
                score += 100;
            } else {
                btnElement.classList.add('wrong');
                allBtns[data.correct].classList.add('correct');
            }
            showFeedback(selectedIndex === data.correct, data.desc);
        }

        function showFeedback(isCorrect, desc) {
            const area = document.getElementById('feedback-area');
            area.style.display = 'block';
            area.className = 'feedback-section ' + (isCorrect ? 'correct' : 'wrong');
            document.getElementById('feedback-title').innerText = isCorrect ? "🎉 回答正确！" : "❌ 回答错误";
            document.getElementById('explanation-text').innerText = desc;
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                loadQuestion();
            } else {
                showEndScreen();
            }
        }

        function showEndScreen() {
            document.getElementById('quiz-view').style.display = 'none';
            const end = document.getElementById('end-screen');
            end.style.display = 'block';
            end.innerHTML = `<h1 style="color:var(--primary-color);">逻辑测试完成！</h1><div style="font-size:3rem; margin:20px;">⭐ 得分: ${score}</div><div style="color:#636e72; margin-bottom: 20px;">太棒了，你已经完全掌握了 C++ 中的 || 运算符！</div><button class="next-btn" onclick="location.reload()" style="float:none;">重新挑战</button>`;
        }

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }

        loadQuestion();
    </script>
</body>
</html>

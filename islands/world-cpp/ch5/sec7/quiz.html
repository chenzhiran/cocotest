<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ 基础挑战：逻辑运算符 AND (&&)</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6C5CE7; 
            --secondary-color: #A29BFE;
            --bg-color: #DFE6E9;     
            --card-bg: #FFFFFF;
            --text-color: #2D3436;   
            --correct-color: #00b894;
            --wrong-color: #d63031;  
            --accent-yellow: #fdcb6e;
            
            /* 代码高亮 */
            --code-bg: #2d2d2d;
            --code-text: #ccc;
            --code-kw: #cc99cd;
            --code-fn: #6196cc;
            --code-num: #f08d49;
            --code-str: #7ec699;
            --code-cmt: #999;
        }

        body {
            font-family: 'Poppins', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#b2bec3 10%, transparent 10%);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 900px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 40px;
            text-align: center;
            position: relative;
            border: 4px solid var(--secondary-color);
            overflow: hidden;
        }

        .header-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary-color);
        }

        .score-box {
            background: var(--accent-yellow);
            padding: 8px 20px;
            border-radius: 30px;
            color: #fff;
            box-shadow: 0 4px 0 #e1b12c;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .progress-container {
            width: 100%;
            height: 12px;
            background-color: #ecf0f1;
            border-radius: 10px;
            margin-bottom: 35px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--secondary-color), var(--primary-color));
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .question-area {
            text-align: left;
            margin-bottom: 30px;
        }
        
        .question-area h2 {
            color: var(--text-color);
            font-size: 1.4rem;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .code-block {
            background: var(--code-bg);
            color: var(--code-text);
            font-family: 'Fira Code', monospace;
            font-variant-ligatures: none; /* 关闭字体连字特效，防止符号变形 */
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            white-space: pre-wrap;
            text-align: left;
            font-size: 1.05rem;
            border-left: 5px solid var(--secondary-color);
        }
        .kw { color: var(--code-kw); font-weight: bold; }
        .fn { color: var(--code-fn); }
        .num { color: var(--code-num); }
        .str { color: var(--code-str); }
        .cmt { color: var(--code-cmt); font-style: italic; }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        @media (min-width: 600px) {
            .options-grid { grid-template-columns: 1fr 1fr; }
        }

        .option-btn {
            background: white;
            border: 3px solid #ecf0f1;
            padding: 18px 25px;
            border-radius: 18px;
            font-size: 1.05rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-color);
            font-weight: 600;
            text-align: left;
            position: relative;
            box-shadow: 0 5px 0 #bdc3c7;
        }

        .option-btn:hover:not([disabled]) {
            border-color: var(--secondary-color);
            transform: translateY(-3px);
        }

        .option-btn:active:not([disabled]) {
            top: 5px;
            box-shadow: 0 0 0 #bdc3c7;
        }
        
        .option-btn.correct {
            background-color: var(--correct-color);
            color: white;
            border-color: var(--correct-color);
            box-shadow: 0 5px 0 #00965e;
        }

        .option-btn.wrong {
            background-color: var(--wrong-color);
            color: white;
            border-color: var(--wrong-color);
            box-shadow: 0 5px 0 #c0392b;
        }

        .feedback-section {
            display: none;
            text-align: left;
            background: #f1f2f6;
            padding: 25px;
            border-radius: 18px;
            margin-top: 30px;
            border-left: 6px solid;
        }
        .feedback-section.correct { border-color: var(--correct-color); }
        .feedback-section.wrong { border-color: var(--wrong-color); }

        .next-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            float: right;
            box-shadow: 0 5px 0 #5649c0;
        }

        .end-screen {
            display: none;
            padding: 20px 0;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div id="quiz-view">
            <div class="header-stats">
                <span id="level-indicator">Level 1 / 10</span>
                <div class="score-box">⭐ <span id="score">0</span></div>
            </div>

            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>

            <div class="question-area" id="question-container"></div>
            <div class="options-grid" id="options-container"></div>

            <div class="feedback-section" id="feedback-area">
                <div style="font-weight: 600; font-size: 1.2rem; margin-bottom: 10px;" id="feedback-title"></div>
                <div style="color: #636e72; line-height: 1.7;" id="explanation-text"></div>
                <button class="next-btn" onclick="nextQuestion()">下一题 ➔</button>
            </div>
        </div>

        <div id="end-screen" class="end-screen"></div>
    </div>

    <script>
        const quizData = [
            {
                q: "在 C++ 编程中，用来表示逻辑“与”（AND）的符号是哪一个？",
                options: ["A. ||", "B. &&", "C. !=", "D. =="],
                correct: 1,
                desc: "在 C++ 中，&& 是逻辑“与”运算符，它就像一个超级严格的检查官。"
            },
            {
                q: "逻辑运算符 AND (&&) 的核心规则是什么？",
                options: ["A. 只要满足任意一个条件就可以通过", "B. 必须所有条件全部满足才能通过", "C. 所有条件都不满足才能通过", "D. 随机决定是否通过"],
                correct: 1,
                desc: "&& 运算符要求两侧的条件都必须为 true，整个表达式的结果才会是 true。缺一不可！"
            },
            {
                q: "教程中使用了哪种物理现象来比喻 && 运算符的工作原理？",
                options: ["A. 串联电路（所有开关必须闭合才能亮灯）", "B. 并联电路（闭合任意一个开关就能亮灯）", "C. 磁铁同极相斥", "D. 杠杆原理"],
                correct: 0,
                desc: "&& 就像串联电路，电流必须流过所有的开关（条件为真）才能最终点亮灯泡。"
            },
            {
                q: "如果程序运行了表达式 `true && false`，它的最终计算结果是什么？",
                options: ["A. true", "B. false", "C. null", "D. 程序报错崩溃"],
                correct: 1,
                desc: "因为 && 要求两边必须同时为 true，只要出现了一个 false，整个结果就会变成 false。"
            },
            {
                q: "观察以下条件判断，英雄在什么情况下才会去治疗 (heal) 目标？",
                code: "if (enemy.type == \"burl\" && enemy.health < 10) {\n    heal(enemy);\n}",
                options: ["A. 只要遇到树精 (burl) 就治疗", "B. 只要目标的生命值小于 10 就治疗", "C. 必须既是树精，且生命值小于 10 才会治疗", "D. 会治疗除了树精以外的任何人"],
                correct: 2,
                desc: "这里使用了 && 连接两个条件，意味着“种族”和“生命值”两个要求必须同时达标，才会执行大括号里的治疗动作。"
            },
            {
                q: "在 C++ 中，角色的生命力（血量）通常使用哪一个属性来表示和判断？",
                options: ["A. value (价值)", "B. distance (距离)", "C. health (健康值)", "D. type (类型)"],
                correct: 2,
                desc: "health 属性代表了单位的生命力。数值越大越健康，数值越小代表越虚弱。"
            },
            {
                q: "你需要收集“价值 (value) 为 10”的“宝石 (gem)”。以下哪段代码的逻辑是完全正确的？",
                options: ["A. if (item.type == \"gem\" || item.value == 10)", "B. if (item.type == \"gem\" && item.value == 10)", "C. if (item.type != \"gem\" && item.value == 10)", "D. if (item.type == \"coin\" && item.value == 10)"],
                correct: 1,
                desc: "为了确保拿到的既是宝石，又是价值 10 的物品，必须使用 && 把这两个条件绑定在一起。"
            },
            {
                q: "在使用 && 检查物体的属性（如 type 或 health）之前，逻辑大师口诀强调的第一条“安全规则”是什么？",
                options: ["A. 必须把 && 放在代码的第一行", "B. 先检查目标是否存在，再检查目标的属性", "C. 目标的生命值必须大于 100 才能检查", "D. 必须先发起攻击再做检查"],
                correct: 1,
                desc: "口诀说：“先查存在再查属性，安全第一不报错”。如果目标不存在，强行检查它的属性会导致程序崩溃。"
            },
            {
                q: "下面这段代码试图只攻击“距离小于 20”的“小怪兽 (munchkin)”，但它犯了一个常见的语法错误。错在哪里？",
                code: "if (enemy.type == \"munchkin\" AND distance < 20) {\n    hero.attack(enemy);\n}",
                options: ["A. 缺少分号结尾", "B. 在 C++ 中不应写英文单词 AND，必须使用符号 &&", "C. distance 单词拼写错误", "D. 代码完全正确"],
                correct: 1,
                desc: "在 C++ 语言中，逻辑与运算符是由两个连字符 && 组成的，直接写英文单词 AND 会导致语法错误。"
            },
            {
                q: "假设左边的条件是 false，右边的条件是 true（即 `false && true`），总的判断结果是？",
                options: ["A. true", "B. false", "C. 一半真一半假", "D. 0"],
                correct: 1,
                desc: "只要有一侧是 false，&& 严格的“一票否决”机制就会让最终结果变为 false。"
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false;

        function loadQuestion() {
            answered = false;
            document.getElementById('feedback-area').style.display = 'none';
            const data = quizData[currentQuestion];
            document.getElementById('level-indicator').innerText = `Level ${currentQuestion + 1} / ${quizData.length}`;
            document.getElementById('progress-bar').style.width = `${((currentQuestion) / quizData.length) * 100}%`;
            document.getElementById('score').innerText = score;

            let html = `<h2>${data.q}</h2>`;
            if (data.code) {
                let codeHtml = escapeHtml(data.code)
                    .replace(/\b(int|return|void|auto|if|else|while|float|true|false)\b/g, '<span class="kw">$1</span>')
                    .replace(/\b(hero|enemy|item|distance|health)\b/g, '<span class="str">$1</span>')
                    .replace(/\b(\d+)\b/g, '<span class="num">$1</span>')
                    .replace(/(&quot;.*?&quot;)/g, '<span class="str">$1</span>')
                    .replace(/(\/\/.*)/g, '<span class="cmt">$1</span>');
                html += `<div class="code-block">${codeHtml}</div>`;
            }
            document.getElementById('question-container').innerHTML = html;

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.classList.add('option-btn');
                btn.onclick = () => checkAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex, btnElement) {
            if (answered) return;
            answered = true;
            const data = quizData[currentQuestion];
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(btn => btn.setAttribute('disabled', 'true'));
            
            if (selectedIndex === data.correct) {
                btnElement.classList.add('correct');
                score += 100;
            } else {
                btnElement.classList.add('wrong');
                allBtns[data.correct].classList.add('correct');
            }
            showFeedback(selectedIndex === data.correct, data.desc);
        }

        function showFeedback(isCorrect, desc) {
            const area = document.getElementById('feedback-area');
            area.style.display = 'block';
            area.className = 'feedback-section ' + (isCorrect ? 'correct' : 'wrong');
            document.getElementById('feedback-title').innerText = isCorrect ? "🎉 回答正确！" : "❌ 回答错误";
            document.getElementById('explanation-text').innerText = desc;
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                loadQuestion();
            } else {
                showEndScreen();
            }
        }

        function showEndScreen() {
            document.getElementById('quiz-view').style.display = 'none';
            const end = document.getElementById('end-screen');
            end.style.display = 'block';
            end.innerHTML = `<h1 style="color:var(--primary-color);">逻辑考核完成！</h1><div style="font-size:3rem; margin:20px;">⭐ 得分: ${score}</div><div style="color:#636e72; margin-bottom: 20px;">恭喜！你已经掌握了严密逻辑 && 和 health 的用法！</div><button class="next-btn" onclick="location.reload()" style="float:none;">重新挑战</button>`;
        }

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }

        loadQuestion();
    </script>
</body>
</html>

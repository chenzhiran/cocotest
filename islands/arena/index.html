<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCombat Style Arena Selection</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Sans+SC:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #2c3e50;
            --parchment: #f4e7c3;
            --border-brown: #5d4037;
            --text-gold: #ffec3d;
            --text-silver: #bdc3c7;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center, #455a64 0%, #1c2833 100%);
            font-family: 'Noto Sans SC', 'Cinzel', sans-serif;
            color: #333;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 1200px; 
            background-color: var(--parchment);
            border: 8px solid var(--border-brown);
            border-radius: 10px;
            margin: 40px 0;
            padding: 30px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            border-bottom: 3px double rgba(93, 64, 55, 0.5);
            margin-bottom: 30px;
            padding-bottom: 20px;
        }

        .header h1 {
            color: #3e2723;
            margin: 0;
            font-family: 'Cinzel', serif;
            font-size: 2.5em;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .header p {
            color: #5d4037;
            font-size: 1.1em;
            margin: 10px 0 0 0;
            font-weight: bold;
        }

        /* === 功能入口 === */
        .guide-section {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .guide-card {
            flex: 1;
            text-decoration: none;
            padding: 20px 25px;
            border-radius: 12px;
            border: 3px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
            min-width: 280px;
            max-width: 380px;
            cursor: pointer;
        }

        .guide-intro { background: linear-gradient(135deg, #134e5e 0%, #71b280 100%); border-color: #a3e4d7; }
        .guide-arena-intro { background: linear-gradient(135deg, #4b134f 0%, #c94b4b 100%); border-color: #d7bde2; }
        .guide-bug-intro { background: linear-gradient(135deg, #cb2d3e 0%, #ef473a 100%); border-color: #ffcba4; }

        .guide-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .guide-icon { font-size: 2.5rem; filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.3)); }
        .guide-text h3 { margin: 0; font-size: 1.4rem; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); font-weight: 900; }
        .guide-text p { margin: 5px 0 0 0; font-size: 0.9rem; color: rgba(255,255,255,0.9); }

        /* === 竞技场列表 === */
        .arena-list { display: flex; flex-direction: column; gap: 40px; }

        .arena-card {
            background-color: #1a1a1a;
            border: 4px solid #4a3b32;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 重点竞技场：冰封竞速 特效 */
        .featured-arena {
            border: 4px solid #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            animation: goldenGlow 3s infinite alternate;
        }

        @keyframes goldenGlow {
            0% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); border-color: #b7950b; }
            100% { box-shadow: 0 0 35px rgba(255, 215, 0, 0.6); border-color: #ffd700; }
        }

        .arena-card:hover { transform: translateY(-5px); border-color: #ffd700; }

        .card-info-section {
            padding: 18px 25px;
            background: linear-gradient(135deg, #34495e 0%, #2c3e50 50%, #22313f 100%);
            border-bottom: 3px solid #b7950b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2;
        }

        .cn-title { font-size: 1.8rem; color: var(--text-gold); font-weight: 900; margin: 0; text-shadow: 2px 2px 0 #000; }
        .en-title { font-family: 'Cinzel', serif; font-size: 1rem; color: #aab7b8; text-transform: uppercase; }
        .story-desc { font-size: 0.95rem; color: #bdc3c7; margin: 10px 0 0 0; font-style: italic; }
        .stars { color: #f1c40f; font-size: 1.3rem; margin-left: 20px; }

        .card-visual-section { width: 100%; height: 240px; position: relative; overflow: hidden; background-color: #000; }
        .card-visual-section img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .visual-overlay { position: absolute; top: 0; right: 0; width: 60%; height: 100%; background: linear-gradient(to left, rgba(0,0,0,0.8), transparent); pointer-events: none; }

        /* 通用悬浮按钮组 */
        .overlay-btn-group {
            position: absolute;
            top: 50%;
            right: 30px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 2;
        }

        /* 冰封竞速专用：下方按钮区域 */
        .teacher-action-area {
            background: #252525;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border-top: 2px solid #444;
        }

        .teacher-btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .group-label {
            color: #ffd700;
            font-weight: 900;
            font-size: 1.1rem;
            min-width: 100px;
            text-shadow: 1px 1px 2px #000;
        }

        /* 针对老师设计的大按钮 */
        .big-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 25px;
            font-size: 1.05rem;
            font-weight: 800;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            color: white;
            min-width: 180px;
        }

        .big-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,255,255,0.2); }

        /* 按钮特效 */
        .glow-blue { background: linear-gradient(135deg, #1e3c72, #2a5298); border-color: #3498db; box-shadow: 0 0 10px rgba(52, 152, 219, 0.5); }
        .glow-gold { background: linear-gradient(135deg, #b7950b, #f1c40f); color: #3e2723; border-color: #fff; animation: pulseGold 2s infinite; }
        .glow-green { background: linear-gradient(135deg, #138d75, #1abc9c); border-color: #48c9b0; }
        .glow-purple { background: linear-gradient(135deg, #6c3483, #a569bd); border-color: #d2b4de; }

        @keyframes pulseGold {
            0% { box-shadow: 0 0 5px rgba(255, 215, 0, 0.5); }
            50% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.8); }
            100% { box-shadow: 0 0 5px rgba(255, 215, 0, 0.5); }
        }

        /* 通用小按钮 */
        .game-btn {
            display: flex; align-items: center; justify-content: center; padding: 8px 20px; min-width: 140px;
            text-decoration: none; font-weight: 800; border-radius: 8px; transition: all 0.2s; border: 2px solid;
        }
        .btn-blue { background: linear-gradient(to bottom, #2980b9, #075586); color: #fff; border-color: #1c4e75; }
        .btn-gold { background: linear-gradient(to bottom, #f7971e, #ffd200); color: #3e2723; border-color: #b7950b; }
        .btn-red { background: linear-gradient(to bottom, #c0392b, #8e44ad); color: #fff; border-color: #641e16; }

        .special-tag {
            position: absolute; top: 15px; left: 15px; background: linear-gradient(to right, #e74c3c, #c0392b);
            color: white; padding: 6px 14px; border-radius: 4px; font-size: 0.9rem; font-weight: bold; z-index: 3;
            box-shadow: 0 0 15px rgba(231, 76, 60, 0.6); border: 2px solid #ff5e57;
        }

        .footer { text-align: center; margin-top: 50px; padding-top: 20px; border-top: 2px solid rgba(93, 64, 55, 0.2); color: #7f8c8d; font-weight: bold; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); backdrop-filter: blur(5px); align-items: center; justify-content: center; }
        .modal-content { background: radial-gradient(circle, #fff 0%, #f4e7c3 100%); padding: 20px; border: 5px solid var(--border-brown); border-radius: 15px; width: 80%; max-width: 400px; text-align: center; position: relative; }
        .close-btn { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }

        @media (max-width: 768px) {
            .teacher-btn-group { flex-direction: column; align-items: stretch; }
            .big-btn { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>扣哒世界竞技场</h1>
        <p>选择你的战场，分阶段挑战，从基础到冲刺，夺取最终胜利！</p>
    </div>

    <div class="guide-section">
        <a href="about_codecombat.html" class="guide-card guide-intro">
            <div class="guide-icon">🏰</div>
            <div class="guide-text"><h3>初识扣哒世界</h3><p>致新导师：平台理念与教学入门</p></div>
        </a>
        <a href="about_arena.html" class="guide-card guide-arena-intro">
            <div class="guide-icon">⚔️</div>
            <div class="guide-text"><h3>竞技场机制解析</h3><p>如何组织赛事与评估学生表现</p></div>
        </a>
        <div class="guide-card guide-bug-intro" onclick="openBugModal()">
            <div class="guide-icon">🐞</div>
            <div class="guide-text"><h3>问题反馈</h3><p>扫码向教研团队反馈Bug</p></div>
        </div>
    </div>

    <div class="arena-list" id="arenaList"></div>

    <div class="footer">来自扣哒世界教研团队</div>
</div>

<div id="bugModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeBugModal()">&times;</span>
        <h3>扫码反馈 Bug</h3>
        <img src="bug_qr.jpeg" alt="QR" style="width:100%; border-radius:10px; margin-top:15px;">
    </div>
</div>

<script>
    const modal = document.getElementById("bugModal");
    function openBugModal() { modal.style.display = "flex"; }
    function closeBugModal() { modal.style.display = "none"; }
    window.onclick = function(event) { if (event.target == modal) modal.style.display = "none"; }

    const arenas = [
        { 
            id: 17, en: "IRON AND ICE", cn: "冰封竞速", img: "iron-and-ice.jpg", stars: "★★★", 
            desc: "钢铁与寒冰的碰撞！在滑溜的冰面上操控重型机甲，保持平衡并摧毁目标。",
            tag: "2026年春AI世青赛竞技场，火热进行中"
        },
        { 
            id: 1, en: "SUNFIRE", cn: "阳炎", img: "sunfire.png", stars: "★★★", 
            desc: "在烈火燎原的峰顶，召唤你的元素大军，利用地形将敌人化为灰烬！",
            tag: "2025年AI世青赛秋季赛决赛竞技场"
        },
        { id: 2, en: "WAKKA MAUL", cn: "逃出地牢", img: "wakka-maul.jpg", stars: "★", desc: "在阴暗的地牢中痛击钻地的地鼠！" },
        { id: 3, en: "POWER PEAK", cn: "力量的顶峰", img: "power-peak.png", stars: "★★", desc: "攀登逻辑的高峰！" },
        { id: 4, en: "CROSS BONES", cn: "十字骨头", img: "cross-bones.png", stars: "★★", desc: "在荒凉的埋骨之地..." },
        { id: 5, en: "SUMMATION SUMMIT", cn: "综合格斗", img: "summation-summit.png", stars: "★★", desc: "算法的综合格斗！" },
        { id: 6, en: "ACE OF CODERS", cn: "王牌程序员", img: "ace-of-coders.png", stars: "★★★★", desc: "电子竞技的巅峰舞台！" },
        { id: 30, en: "ZERO SUM", cn: "零和博弈", img: "zero-sum.png", stars: "★★★", desc: "数学博弈的对决。" },
        { id: 31, en: "CAVERN SURVIVAL", cn: "洞穴求生", img: "cavern-survival.jpg", stars: "★", desc: "地下洞穴求生。" }
    ];

    const listContainer = document.getElementById('arenaList');
    function getSlug(name) { return name.toLowerCase().replace(/\s+/g, ''); }

    arenas.forEach(arena => {
        const slug = getSlug(arena.en);
        const card = document.createElement('div');
        card.className = 'arena-card' + (arena.id === 17 ? ' featured-arena' : '');

        let contentHtml = `
            <div class="card-info-section">
                <div class="info-left">
                    <div class="title-row"><h2 class="cn-title">${arena.cn}</h2><div class="en-title">${arena.en}</div></div>
                    <p class="story-desc">${arena.desc}</p>
                </div>
                <div class="stars">${arena.stars}</div>
            </div>
            <div class="card-visual-section">
                ${arena.tag ? `<div class="special-tag">${arena.tag}</div>` : ''}
                <img src="src/${arena.img}" alt="${arena.en}">
                <div class="visual-overlay"></div>
        `;

        if (arena.id === 17) {
            // 冰封竞速：关闭图片内的按钮，改为下方大型按钮区域
            contentHtml += `</div> <div class="teacher-action-area">
                    <div class="teacher-btn-group">
                        <span class="group-label">【基础阶段】</span>
                        <a href="${slug}_basic.html" class="big-btn glow-blue">📖 教学页面讲解</a>
                        <a href="https://assets.koudashijie.com/arena-ppt/ironandice/ironandice_basic_ppt.pptx" class="big-btn glow-green">📥 基础课件下载 (PPT)</a>
                        <a href="https://assets.koudashijie.com/arena-ppt/ironandice/ironandice_basic.mp4" class="big-btn glow-purple">🎬 基础教学视频导读</a>
                    </div>
                    <div class="teacher-btn-group" style="margin-top:10px;">
                        <span class="group-label">【进阶阶段】</span>
                        <a href="${slug}_advanced.html" class="big-btn glow-gold">🚀 进阶页面讲解</a>
                        <a href="https://assets.koudashijie.com/arena-ppt/ironandice/ironandice_advanced_ppt.pptx" class="big-btn glow-green">📥 进阶课件下载 (PPT)</a>
                    </div>
                </div>
            `;
        } else {
            // 其他竞技场逻辑保持不变
            let btns = '';
            if (arena.id === 1) {
                btns = `<a href="${slug}_basic.html" class="game-btn btn-blue">📘 基础篇</a>
                        <a href="${slug}_advanced.html" class="game-btn btn-gold">⚔️ 强化篇</a>
                        <a href="${slug}_sprint.html" class="game-btn btn-red">🔥 冲刺篇</a>`;
            } else if (arena.id >= 2 && arena.id <= 6) {
                btns = `<a href="${slug}_basic.html" class="game-btn btn-blue">📘 基础篇</a>
                        <a href="${slug}_advanced.html" class="game-btn btn-gold">⚔️ 强化篇</a>`;
            } else if (arena.id < 30) {
                btns = `<a href="${slug}_basic.html" class="game-btn btn-blue">📘 基础篇</a>`;
            }

            contentHtml += `
                <div class="overlay-btn-group">${btns}</div>
            </div>`;
        }

        card.innerHTML = contentHtml;
        listContainer.appendChild(card);
    });
</script>
</body>
</html>

<html lang="zh-CN">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCombat Style Arena Selection</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Sans+SC:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #2c3e50;
            --parchment: #f4e7c3;
            --border-brown: #5d4037;
            --text-gold: #ffec3d;
            --text-silver: #bdc3c7;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center, #455a64 0%, #1c2833 100%);
            font-family: 'Noto Sans SC', 'Cinzel', sans-serif;
            color: #333;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 1200px; 
            background-color: var(--parchment);
            border: 8px solid var(--border-brown);
            border-radius: 10px;
            margin: 40px 0;
            padding: 30px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            border-bottom: 3px double rgba(93, 64, 55, 0.5);
            margin-bottom: 30px;
            padding-bottom: 20px;
        }

        .header h1 {
            color: #3e2723;
            margin: 0;
            font-family: 'Cinzel', serif;
            font-size: 2.5em;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .header p {
            color: #5d4037;
            font-size: 1.1em;
            margin: 10px 0 0 0;
            font-weight: bold;
        }

        /* === 功能入口 === */
        .guide-section {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .guide-card {
            flex: 1;
            text-decoration: none;
            padding: 20px 25px;
            border-radius: 12px;
            border: 3px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
            min-width: 280px;
            max-width: 380px;
            cursor: pointer;
            box-sizing: border-box;
        }

        .guide-intro { background: linear-gradient(135deg, #134e5e 0%, #71b280 100%); border-color: #a3e4d7; }
        .guide-arena-intro { background: linear-gradient(135deg, #4b134f 0%, #c94b4b 100%); border-color: #d7bde2; }
        .guide-bug-intro { background: linear-gradient(135deg, #cb2d3e 0%, #ef473a 100%); border-color: #ffcba4; }

        .guide-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .guide-icon { font-size: 2.5rem; filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.3)); }
        .guide-text h3 { margin: 0; font-size: 1.4rem; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); font-weight: 900; }
        .guide-text p { margin: 5px 0 0 0; font-size: 0.9rem; color: rgba(255,255,255,0.9); }

        /* === 竞技场列表 === */
        .arena-list { display: flex; flex-direction: column; gap: 40px; }

        .arena-card {
            background-color: #1a1a1a;
            border: 4px solid #4a3b32;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 重点竞技场：冰封竞速 特效 */
        .featured-arena {
            border: 4px solid #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            animation: goldenGlow 3s infinite alternate;
        }

        @keyframes goldenGlow {
            0% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); border-color: #b7950b; }
            100% { box-shadow: 0 0 35px rgba(255, 215, 0, 0.6); border-color: #ffd700; }
        }

        .arena-card:hover { transform: translateY(-5px); border-color: #ffd700; }

        .card-info-section {
            padding: 18px 25px;
            background: linear-gradient(135deg, #34495e 0%, #2c3e50 50%, #22313f 100%);
            border-bottom: 3px solid #b7950b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2;
        }

        .cn-title { font-size: 1.8rem; color: var(--text-gold); font-weight: 900; margin: 0; text-shadow: 2px 2px 0 #000; }
        .en-title { font-family: 'Cinzel', serif; font-size: 1rem; color: #aab7b8; text-transform: uppercase; }
        .story-desc { font-size: 0.95rem; color: #bdc3c7; margin: 10px 0 0 0; font-style: italic; }
        .stars { color: #f1c40f; font-size: 1.3rem; margin-left: 20px; }

        .card-visual-section { width: 100%; height: 240px; position: relative; overflow: hidden; background-color: #000; }
        .card-visual-section img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .visual-overlay { position: absolute; top: 0; right: 0; width: 60%; height: 100%; background: linear-gradient(to left, rgba(0,0,0,0.9), transparent); pointer-events: none; z-index: 1;}

        /* 通用悬浮按钮组 */
        .overlay-btn-group {
            position: absolute;
            top: 50%;
            right: 30px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 2;
        }

        /* 冰封竞速专用：下方双列控制台布局 */
        .teacher-dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            background: #151515;
            padding: 25px 30px;
            border-top: 3px solid #b7950b;
        }

        .dashboard-panel {
            background: linear-gradient(to bottom, rgba(255,255,255,0.08), rgba(0,0,0,0.5));
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,215,0,0.3);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 5px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .panel-header {
            color: #ffd700;
            font-weight: 900;
            font-size: 1.25rem;
            text-align: center;
            border-bottom: 2px dashed rgba(255,215,0,0.4);
            padding-bottom: 12px;
            margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(255,215,0,0.6);
            letter-spacing: 1px;
        }

        /* 针对老师设计的大按钮，强制占满面板宽度 */
        .big-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 25px;
            font-size: 1.05rem;
            font-weight: 800;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            color: white;
            width: 100%;
            box-sizing: border-box;
            letter-spacing: 1px;
        }

        .big-btn:hover { transform: scale(1.03); box-shadow: 0 0 20px rgba(255,255,255,0.25); }

        /* 按钮特效 */
        .glow-blue { background: linear-gradient(135deg, #1e3c72, #2a5298); border-color: #3498db; box-shadow: 0 0 10px rgba(52, 152, 219, 0.5); }
        .glow-gold { background: linear-gradient(135deg, #b7950b, #f1c40f); color: #3e2723; border-color: #fff; animation: pulseGold 2s infinite; }
        .glow-green { background: linear-gradient(135deg, #138d75, #1abc9c); border-color: #48c9b0; }
        .glow-purple { background: linear-gradient(135deg, #6c3483, #a569bd); border-color: #d2b4de; }

        @keyframes pulseGold {
            0% { box-shadow: 0 0 5px rgba(255, 215, 0, 0.5); }
            50% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.8); }
            100% { box-shadow: 0 0 5px rgba(255, 215, 0, 0.5); }
        }

        /* 占位提示框，让左右两侧对称丰满 */
        .placeholder-box {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            text-align: center;
            color: #95a5a6;
            font-size: 0.95rem;
            font-weight: bold;
            border: 2px dashed #444;
            border-radius: 8px;
            margin-top: 2px;
            background: rgba(0,0,0,0.4);
            line-height: 1.5;
        }

        /* 通用小按钮 */
        .game-btn {
            display: flex; align-items: center; justify-content: center; padding: 8px 20px; min-width: 140px;
            text-decoration: none; font-weight: 800; border-radius: 8px; transition: all 0.2s; border: 2px solid;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8); box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        .btn-blue { background: linear-gradient(to bottom, #2980b9, #075586); color: #fff; border-color: #1c4e75; }
        .btn-gold { background: linear-gradient(to bottom, #f7971e, #ffd200); color: #3e2723; border-color: #b7950b; text-shadow: none; }
        .btn-red { background: linear-gradient(to bottom, #c0392b, #8e44ad); color: #fff; border-color: #641e16; }

        .game-btn:hover { transform: translateY(-3px) scale(1.02); }

        .special-tag {
            position: absolute; top: 15px; left: 15px; background: linear-gradient(to right, #d35400, #e67e22);
            color: white; padding: 6px 14px; border-radius: 4px; font-size: 0.85rem; font-weight: bold; z-index: 3;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5); border: 2px solid #f39c12;
        }

        /* 超级发光 Tag：专为冰封竞速设计 */
        .super-glow-tag {
            background: linear-gradient(135deg, #ff0000, #ff5e00);
            border: 2px solid #ffeb3b !important;
            font-size: 1rem !important;
            padding: 8px 18px;
            animation: superGlow 1.5s infinite alternate;
        }

        @keyframes superGlow {
            0% { 
                box-shadow: 0 0 10px #ff0000, 0 0 20px #ff5e00; 
                text-shadow: 0 0 5px #fff, 0 0 10px #ffeb3b; 
                transform: scale(1); 
            }
            100% { 
                box-shadow: 0 0 20px #ff0000, 0 0 40px #ff5e00, 0 0 60px #ffeb3b; 
                text-shadow: 0 0 10px #fff, 0 0 20px #ffeb3b, 0 0 30px #ff9800; 
                transform: scale(1.03); 
            }
        }

        .footer { text-align: center; margin-top: 50px; padding-top: 20px; border-top: 2px solid rgba(93, 64, 55, 0.2); color: #7f8c8d; font-weight: bold; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); backdrop-filter: blur(5px); align-items: center; justify-content: center; }
        .modal-content { background: radial-gradient(circle, #fff 0%, #f4e7c3 100%); padding: 20px; border: 5px solid var(--border-brown); border-radius: 15px; width: 80%; max-width: 400px; text-align: center; position: relative; }
        .close-btn { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }

        /* 响应式 PC / 移动端全面适配 */
        @media (max-width: 768px) {
            .container { padding: 15px; margin: 20px 0; }
            .header h1 { font-size: 1.8em; }
            .guide-section { flex-direction: column; align-items: center; }
            .guide-card { width: 100%; max-width: 100%; }
            .teacher-dashboard { grid-template-columns: 1fr; padding: 15px; gap: 15px; }
            
            /* 卡片信息区改为上下结构 */
            .card-info-section { flex-direction: column; align-items: flex-start; gap: 10px; }
            .stars { margin-left: 0; }
            
            /* 悬浮按钮组移至底部居中，遮罩方向改为由下向上 */
            .card-visual-section { height: 260px; }
            .overlay-btn-group {
                top: auto;
                bottom: 15px;
                right: 50%;
                transform: translateX(50%);
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                width: 90%;
            }
            .visual-overlay {
                width: 100%;
                height: 60%;
                top: auto;
                bottom: 0;
                background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            }
        }
        
        @media (max-width: 480px) {
            .game-btn { min-width: 110px; padding: 6px 12px; font-size: 0.9rem; }
        }
    </style>
</head>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编程小英雄挑战赛 - 逻辑非与优先级篇</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        /* --- 基础设置 (紫色现代风格) --- */
        :root {
            --primary-color: #6C5CE7; /* 主色调：紫色 */
            --secondary-color: #A29BFE;
            --bg-color: #DFE6E9;     /* 背景灰 */
            --card-bg: #FFFFFF;
            --text-color: #2D3436;   /* 深色文字 */
            --correct-color: #00b894;/* 正确绿 */
            --wrong-color: #d63031;  /* 错误红 */
            --accent-yellow: #fdcb6e;/* 强调黄 */
            
            /* 代码高亮颜色 */
            --code-bg: #2d2d2d;
            --code-text: #ccc;
            --code-kw: #cc99cd; /* 关键字 (purple/pink) */
            --code-fn: #6196cc; /* 函数/方法 (blue) */
            --code-num: #f08d49; /* 数字 (orange) */
            --code-str: #7ec699; /* 字符串 (green) */
            --code-cmt: #777777; /* 注释 (grey) */
            --code-op: #f08d49; /* 运算符 (orange) */
        }

        body {
            font-family: 'Poppins', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            /* 点阵背景纹理 */
            background-image: radial-gradient(#b2bec3 10%, transparent 10%);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        /* --- 游戏容器 --- */
        .game-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 700px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 40px;
            text-align: center;
            position: relative;
            border: 4px solid var(--secondary-color);
            overflow: hidden;
        }

        /* --- 顶部状态栏 --- */
        .header-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary-color);
        }

        .score-box {
            background: var(--accent-yellow);
            padding: 8px 20px;
            border-radius: 30px;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            box-shadow: 0 4px 0 #e1b12c;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* --- 进度条 --- */
        .progress-container {
            width: 100%;
            height: 12px;
            background-color: #ecf0f1;
            border-radius: 10px;
            margin-bottom: 35px;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--secondary-color), var(--primary-color));
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* --- 题目区域 --- */
        .question-area {
            text-align: left;
            margin-bottom: 30px;
        }
        
        .question-area h2 {
            color: var(--text-color);
            font-size: 1.3rem;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        /* --- 代码高亮样式 --- */
        .code-block {
            background: var(--code-bg);
            color: var(--code-text);
            font-family: 'Fira Code', monospace;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            white-space: pre-wrap;
            text-align: left;
            font-size: 0.95rem;
            border-left: 5px solid var(--secondary-color);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
            overflow-x: auto; /* 防止长代码溢出 */
        }
        /* 语法着色 */
        .kw { color: var(--code-kw); font-weight: bold; }
        .fn { color: var(--code-fn); }
        .num { color: var(--code-num); }
        .str { color: var(--code-str); }
        .cmt { color: var(--code-cmt); font-style: italic; }
        .op { color: var(--code-op); font-weight: bold; }

        /* --- 选项按钮 --- */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        @media (min-width: 600px) {
            .options-grid { grid-template-columns: 1fr 1fr; }
        }

        .option-btn {
            background: white;
            border: 3px solid #ecf0f1;
            padding: 18px 25px;
            border-radius: 18px;
            font-size: 0.95rem; 
            font-family: 'Fira Code', inherit;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            color: var(--text-color);
            font-weight: 600;
            text-align: left;
            position: relative;
            top: 0;
            box-shadow: 0 5px 0 #bdc3c7;
            word-break: break-all;
            white-space: pre-wrap;
        }

        .option-btn:hover:not([disabled]) {
            border-color: var(--secondary-color);
            transform: translateY(-3px);
            box-shadow: 0 8px 0 #aab0b3;
        }

        .option-btn:active:not([disabled]) {
            top: 5px;
            box-shadow: 0 0 0 #bdc3c7;
        }
        
        .option-btn[disabled] {
            cursor: default;
        }

        /* --- 答题状态 --- */
        .option-btn.correct {
            background-color: var(--correct-color);
            color: white;
            border-color: var(--correct-color);
            box-shadow: 0 5px 0 #00965e;
        }

        .option-btn.wrong {
            background-color: var(--wrong-color);
            color: white;
            border-color: var(--wrong-color);
            box-shadow: 0 5px 0 #c0392b;
            animation: shake 0.5s;
        }

        /* --- 解析区域 --- */
        .feedback-section {
            display: none;
            text-align: left;
            background: #f1f2f6;
            padding: 25px;
            border-radius: 18px;
            margin-top: 30px;
            border-left: 6px solid;
            animation: slideUp 0.4s ease-out;
        }
        .feedback-section.correct { border-color: var(--correct-color); }
        .feedback-section.wrong { border-color: var(--wrong-color); }

        .feedback-title {
            font-weight: 600;
            font-size: 1.2rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .correct .feedback-title { color: var(--correct-color); }
        .wrong .feedback-title { color: var(--wrong-color); }

        .explanation-text {
            color: #636e72;
            line-height: 1.7;
            font-size: 1rem;
        }

        /* --- 下一题按钮 --- */
        .next-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 0 #5649c0;
            transition: all 0.2s;
            float: right;
        }
        .next-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .next-btn:active { transform: translateY(5px); box-shadow: none; }

        /* --- 结算画面 --- */
        .end-screen {
            display: none;
            padding: 20px 0;
        }
        .end-title { font-size: 2.2rem; color: var(--primary-color); margin-bottom: 10px; }
        .end-score-box {
            background: var(--accent-yellow);
            color: white;
            padding: 20px 40px;
            border-radius: 25px;
            display: inline-block;
            margin: 30px 0;
            box-shadow: 0 8px 0 #e1b12c;
        }
        .end-score { font-size: 3.5rem; font-weight: bold; line-height: 1; }
        .end-desc { color: #636e72; font-size: 1.1rem; margin-bottom: 30px; }
        
        .perfect-score-text {
            background: linear-gradient(45deg, #FFD700, #FF8C00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        /* --- 动画定义 --- */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .confetti {
            position: absolute;
            width: 12px; height: 12px;
            background-color: #f00;
            border-radius: 3px;
            animation: fall linear forwards;
            z-index: 10;
        }
        @keyframes fall {
            to { transform: translateY(80vh) rotate(720deg); opacity: 0; }
        }

    </style>
</head>
<body>

    <div class="game-container">
        <div id="quiz-view">
            <div class="header-stats">
                <span id="level-indicator">Level 1 / 10</span>
                <div class="score-box">⭐ <span id="score">0</span></div>
            </div>

            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>

            <div class="question-area" id="question-container">
                </div>

            <div class="options-grid" id="options-container">
                </div>

            <div class="feedback-section" id="feedback-area">
                <div class="feedback-title" id="feedback-title"></div>
                <div class="explanation-text" id="explanation-text"></div>
                <div style="overflow: hidden;">
                    <button class="next-btn" onclick="nextQuestion()">下一题 ➔</button>
                </div>
            </div>
        </div>

        <div id="end-screen" class="end-screen">
            </div>
    </div>

    <script>
        // --- 题目数据 (逻辑非与优先级篇) ---
        const quizData = [
            {
                q: "1. 在Python中，not 运算符的作用是什么？",
                code: "if not is_safe:",
                options: [
                    "A) 检查两个条件是否都成立",
                    "B) 检查两个条件中至少有一个成立",
                    "C) 将True变成False，False变成True",
                    "D) 给变量赋值"
                ],
                correct: 2, // C
                desc: "not 运算符是逻辑非运算符，它将布尔值取反：True 变成 False，False 变成 True。"
            },
            {
                q: "2. 在程序中，not secretC 表示什么？",
                code: "if not secretC:\n    hero.say(\"Go!\")",
                options: [
                    "A) secretC为真",
                    "B) secretC为假",
                    "C) secretC不存在",
                    "D) secretC的值"
                ],
                correct: 1, // B
                desc: "not secretC 表达式在 secretC 为假(False)时结果为真(True)，所以它用于检查 secretC 是否为假。"
            },
            {
                q: "3. 如果 secretC 是 True，not secretC 的结果是什么？",
                code: "secretC = True\nprint(not secretC)",
                options: [
                    "A) True",
                    "B) False",
                    "C) 1",
                    "D) 0"
                ],
                correct: 1, // B
                desc: "如果 secretC 是 True，not secretC 就是对 True 取反，结果是 False。"
            },
            {
                q: "4. 在Csilla的逻辑中，(secretB and (not secretC)) 表示什么？",
                code: "if secretB and (not secretC):",
                options: [
                    "A) secretB为真且secretC为真",
                    "B) secretB为真且secretC为假",
                    "C) secretB为假且secretC为真",
                    "D) secretB为假且secretC为假"
                ],
                correct: 1, // B
                desc: "and 要求两边都为真。(not secretC) 为真意味着 secretC 必须为假。所以是 secretB 为真且 secretC 为假。"
            },
            {
                q: "5. 以下哪个表达式的结果是 True？",
                code: "print(？？？)",
                options: [
                    "A) not True",
                    "B) not False",
                    "C) not (True and True)",
                    "D) not (True or True)"
                ],
                correct: 1, // B
                desc: "not False 等于 True。其他选项的结果都是 False。"
            },
            {
                q: "6. 在程序中，enemy.type != \"burl\" 等价于什么？",
                code: "if enemy.type != \"burl\":",
                options: [
                    "A) enemy.type == \"burl\"",
                    "B) not enemy.type == \"burl\"",
                    "C) enemy.type and \"burl\"",
                    "D) enemy.type or \"burl\""
                ],
                correct: 1, // B
                desc: "!= (不等于) 在逻辑上等同于 not (==) (不是等于)。"
            },
            {
                q: "7. 在Python中，逻辑运算符的优先级顺序是什么？",
                options: [
                    "A) not > and > or",
                    "B) and > or > not",
                    "C) or > and > not",
                    "D) not > or > and"
                ],
                correct: 0, // A
                desc: "在Python中，逻辑运算符的优先级是：not 最高，然后是 and，最后是 or。"
            },
            {
                q: "8. 为什么在复杂逻辑表达式中要使用括号？",
                code: "(A and B) or C",
                options: [
                    "A) 为了让代码更漂亮",
                    "B) 为了明确运算顺序，避免歧义",
                    "C) 为了增加代码长度",
                    "D) 为了减少运算速度"
                ],
                correct: 1, // B
                desc: "在复杂逻辑表达式中使用括号可以明确运算顺序，避免因为运算符优先级导致的逻辑错误或歧义。"
            },
            {
                q: "9. 如果想让英雄避开 \"ogre\" 类型的敌人，应该使用哪个表达式？",
                code: "if ??? : # 避开 ogre",
                options: [
                    "A) if enemy.type == \"ogre\"",
                    "B) if enemy.type != \"ogre\"",
                    "C) if not enemy.type == \"ogre\"",
                    "D) B和C都对"
                ],
                correct: 3, // D
                desc: "B使用不等于运算符，C使用逻辑非和等于运算符，两者逻辑上是等价的，都表示“如果类型不是ogre”。"
            },
            {
                q: "10. 计算表达式结果：secretA=False, secretB=True, secretC=True",
                code: "(secretA and secretB) or (secretB and (not secretC))",
                options: [
                    "A) True",
                    "B) False",
                    "C) 错误",
                    "D) 不确定"
                ],
                correct: 1, // B
                desc: "计算过程：(False and True) or (True and False) -> False or False -> False。"
            }
        ];

        // --- 游戏状态变量 ---
        let currentQuestion = 0;
        let score = 0;
        let answered = false;

        // --- DOM 元素 ---
        const quizView = document.getElementById('quiz-view');
        const endScreen = document.getElementById('end-screen');
        const questionContainer = document.getElementById('question-container');
        const optionsContainer = document.getElementById('options-container');
        const levelIndicator = document.getElementById('level-indicator');
        const scoreDisplay = document.getElementById('score');
        const progressBar = document.getElementById('progress-bar');
        const feedbackArea = document.getElementById('feedback-area');
        const feedbackTitle = document.getElementById('feedback-title');
        const explanationText = document.getElementById('explanation-text');

        // --- 初始化游戏 ---
        function loadQuestion() {
            answered = false;
            feedbackArea.style.display = 'none';
            
            const data = quizData[currentQuestion];
            
            levelIndicator.innerText = `Level ${currentQuestion + 1} / ${quizData.length}`;
            progressBar.style.width = `${((currentQuestion) / quizData.length) * 100}%`;
            scoreDisplay.innerText = score;
            
            let html = `<h2>${data.q}</h2>`;
            if (data.code) {
                // 优化的 HTML 转义与高亮逻辑
                let codeHtml = escapeHtml(data.code);

                // 1. 字符串高亮
                codeHtml = codeHtml.replace(/(".*?")/g, '<span class="str">$1</span>');

                // 2. 注释高亮
                codeHtml = codeHtml.replace(/(#.*)/g, '<span class="cmt">$1</span>');

                // 3. 关键字高亮 (新增 not, and, or, secretX 等)
                codeHtml = codeHtml.replace(/\b(def|return|hero|game|ui|player|pet|on|off|hear|spawn|event|onSpawn|setActionFor|friendUnit|enemy|target|attack|moveXY|soldier|while|True|False|if|else|elif|unit|findNearestEnemy|centerFormation|defendLane|pos|spawnPlayerXY|addDefeatGoal|guardian|munchkin|spawnTime|nextTime|time|randomInteger|onDefeat|toDefeat|defeated|spawnXY|behavior|min|max|ogre|addManualGoal|setGoalState|scoutGoal|bossGoal|scoutsDefeated|type|global|completeGoal|setState|munchkinSpawner|passageForest1|spawnType|defeat|destroy|track|generator|collect|onCollect|collector|item|value|health|requiredScore|score|itemSpawnTime|spawnRandomItem|collide|onCollide|scale|fence|mushroom|powerEndTime|powerDuration|other|spawnValuable|destroyTime|lifetime|checkSpawns|spawnInterval|db|get|set|spawnTreasures|topScore|spawnOgreWave|offset|forest|bronze-coin|knight|maxSpeed|gem|range|checkTimeScore|scout|attackDamage|maxHealth|addSurviveGoal|addCollectGoal|spawnDelay|POWER_DURATION|COIN_SCORE|HERO_SPEED|SPAWN_DELAY|DEFEATED_SCORE|TIME_SCORE|powerPlayerUp|goldCoins|silverCoins|bronzeCoins|sum|name|id|say|print|findNearestItem|getEnemyX|isCloseType|distanceTo|None|apple|burl|or|and|thrower|coin|then|not|secretA|secretB|secretC|is_safe)\b/g, '<span class="kw">$1</span>');
                
                // 4. 特殊符号高亮
                codeHtml = codeHtml.replace(/(!=)/g, '<span class="op">$1</span>');

                // 5. 数字高亮
                codeHtml = codeHtml.replace(/\b(\d+|-\d+|\d+\.\d+)\b/g, '<span class="num">$1</span>');

                // 6. 方法调用 (.xxx)
                codeHtml = codeHtml.replace(/(\.\w+)/g, '<span class="fn">$1</span>');

                html += `<div class="code-block">${codeHtml}</div>`;
            }
            questionContainer.innerHTML = html;
            
            optionsContainer.innerHTML = '';
            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.classList.add('option-btn');
                btn.onclick = () => checkAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        // --- 检查答案 ---
        function checkAnswer(selectedIndex, btnElement) {
            if (answered) return;
            answered = true;

            const data = quizData[currentQuestion];
            const allBtns = optionsContainer.querySelectorAll('.option-btn');
            
            allBtns.forEach(btn => btn.setAttribute('disabled', 'true'));
            
            if (selectedIndex === data.correct) {
                btnElement.classList.add('correct');
                score += 100;
                scoreDisplay.innerText = score;
                createConfetti();
                showFeedback(true, "🎉 回答正确！", data.desc);
            } else {
                btnElement.classList.add('wrong');
                setTimeout(() => {
                   allBtns[data.correct].classList.add('correct');
                }, 400);
                const rightAnswerChar = ["A", "B", "C", "D"][data.correct];
                showFeedback(false, `❌ 回答错误，正确答案是 ${rightAnswerChar}`, data.desc);
            }
        }

        // --- 显示解析 ---
        function showFeedback(isCorrect, title, desc) {
            feedbackArea.classList.remove('correct', 'wrong');
            feedbackArea.classList.add(isCorrect ? 'correct' : 'wrong');
            feedbackTitle.innerHTML = title;
            explanationText.innerHTML = desc;
            feedbackArea.style.display = 'block';
            feedbackArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // --- 下一题 ---
        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                loadQuestion();
            } else {
                showEndScreen();
            }
        }

        // --- 结束画面 ---
        function showEndScreen() {
            quizView.style.display = 'none';
            endScreen.style.display = 'block';
            progressBar.parentElement.style.display = 'none'; 

            const totalScore = quizData.length * 100;
            const isPerfect = (score === totalScore);
            
            let html = '';
            if (isPerfect) {
                for(let i=0; i<5; i++) setTimeout(createConfetti, i*300);
                html += `<div class="end-title">🎉 逻辑反转大师！ 🎉</div>`;
                html += `<div class="end-score-box">总得分 <div class="end-score perfect-score-text">${score}</div></div>`;
                html += `<div class="end-desc">太棒了！你已经征服了所有逻辑运算符，思维清晰无比！</div>`;
            } else {
                html += `<div class="end-title">挑战完成！</div>`;
                html += `<div class="end-score-box">总得分 <div class="end-score">${score} / ${totalScore}</div></div>`;
                html += `<div class="end-desc">做得不错！继续加油，熟练掌握逻辑运算的优先级！</div>`;
            }
            html += `<button class="next-btn" onclick="location.reload()" style="float:none; font-size:1.2rem; padding: 15px 40px;">🔄 再玩一次</button>`;
            
            endScreen.innerHTML = html;
        }

        // --- 撒花特效 ---
        function createConfetti() {
            const colors = ['#ff7675', '#74b9ff', '#55efc4', '#ffeaa7', '#a29bfe', '#fdcb6e'];
            const container = document.querySelector('.game-container');
            for (let i = 0; i < 40; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = '-20px';
                const scale = Math.random() * 0.6 + 0.4;
                confetti.style.transform = `scale(${scale}) rotate(${Math.random()*360}deg)`;
                confetti.style.animationDuration = (Math.random() * 1.5 + 1) + 's';
                confetti.style.animationDelay = Math.random() * 0.5 + 's';
                
                container.appendChild(confetti);
                setTimeout(() => confetti.remove(), 2500);
            }
        }

        // --- HTML转义 ---
        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        // --- 启动游戏 ---
        loadQuestion();

    </script>
</body>
</html>

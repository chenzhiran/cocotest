<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编程小英雄挑战赛 - 分数系统与运算篇</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        /* --- 基础设置 (紫色现代风格) --- */
        :root {
            --primary-color: #6C5CE7; /* 主色调：紫色 */
            --secondary-color: #A29BFE;
            --bg-color: #DFE6E9;     /* 背景灰 */
            --card-bg: #FFFFFF;
            --text-color: #2D3436;   /* 深色文字 */
            --correct-color: #00b894;/* 正确绿 */
            --wrong-color: #d63031;  /* 错误红 */
            --accent-yellow: #fdcb6e;/* 强调黄 */
            
            /* 代码高亮颜色 */
            --code-bg: #2d2d2d;
            --code-text: #ccc;
            --code-kw: #cc99cd; /* 关键字 (purple/pink) */
            --code-fn: #6196cc; /* 函数/方法 (blue) */
            --code-num: #f08d49; /* 数字 (orange) */
            --code-str: #7ec699; /* 字符串 (green) */
            --code-cmt: #777777; /* 注释 (grey) */
        }

        body {
            font-family: 'Poppins', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            /* 点阵背景纹理 */
            background-image: radial-gradient(#b2bec3 10%, transparent 10%);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        /* --- 游戏容器 --- */
        .game-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 700px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 40px;
            text-align: center;
            position: relative;
            border: 4px solid var(--secondary-color);
            overflow: hidden;
        }

        /* --- 顶部状态栏 --- */
        .header-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary-color);
        }

        .score-box {
            background: var(--accent-yellow);
            padding: 8px 20px;
            border-radius: 30px;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            box-shadow: 0 4px 0 #e1b12c;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* --- 进度条 --- */
        .progress-container {
            width: 100%;
            height: 12px;
            background-color: #ecf0f1;
            border-radius: 10px;
            margin-bottom: 35px;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--secondary-color), var(--primary-color));
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* --- 题目区域 --- */
        .question-area {
            text-align: left;
            margin-bottom: 30px;
        }
        
        .question-area h2 {
            color: var(--text-color);
            font-size: 1.3rem;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        /* --- 代码高亮样式 --- */
        .code-block {
            background: var(--code-bg);
            color: var(--code-text);
            font-family: 'Fira Code', monospace;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            white-space: pre-wrap;
            text-align: left;
            font-size: 0.95rem;
            border-left: 5px solid var(--secondary-color);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
            overflow-x: auto; /* 防止长代码溢出 */
        }
        /* 语法着色 */
        .kw { color: var(--code-kw); font-weight: bold; }
        .fn { color: var(--code-fn); }
        .num { color: var(--code-num); }
        .str { color: var(--code-str); }
        .cmt { color: var(--code-cmt); font-style: italic; }

        /* --- 选项按钮 --- */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        @media (min-width: 600px) {
            .options-grid { grid-template-columns: 1fr 1fr; }
        }

        .option-btn {
            background: white;
            border: 3px solid #ecf0f1;
            padding: 18px 25px;
            border-radius: 18px;
            font-size: 0.95rem; 
            font-family: 'Fira Code', inherit;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            color: var(--text-color);
            font-weight: 600;
            text-align: left;
            position: relative;
            top: 0;
            box-shadow: 0 5px 0 #bdc3c7;
            word-break: break-all;
            white-space: pre-wrap;
        }

        .option-btn:hover:not([disabled]) {
            border-color: var(--secondary-color);
            transform: translateY(-3px);
            box-shadow: 0 8px 0 #aab0b3;
        }

        .option-btn:active:not([disabled]) {
            top: 5px;
            box-shadow: 0 0 0 #bdc3c7;
        }
        
        .option-btn[disabled] {
            cursor: default;
        }

        /* --- 答题状态 --- */
        .option-btn.correct {
            background-color: var(--correct-color);
            color: white;
            border-color: var(--correct-color);
            box-shadow: 0 5px 0 #00965e;
        }

        .option-btn.wrong {
            background-color: var(--wrong-color);
            color: white;
            border-color: var(--wrong-color);
            box-shadow: 0 5px 0 #c0392b;
            animation: shake 0.5s;
        }

        /* --- 解析区域 --- */
        .feedback-section {
            display: none;
            text-align: left;
            background: #f1f2f6;
            padding: 25px;
            border-radius: 18px;
            margin-top: 30px;
            border-left: 6px solid;
            animation: slideUp 0.4s ease-out;
        }
        .feedback-section.correct { border-color: var(--correct-color); }
        .feedback-section.wrong { border-color: var(--wrong-color); }

        .feedback-title {
            font-weight: 600;
            font-size: 1.2rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .correct .feedback-title { color: var(--correct-color); }
        .wrong .feedback-title { color: var(--wrong-color); }

        .explanation-text {
            color: #636e72;
            line-height: 1.7;
            font-size: 1rem;
        }

        /* --- 下一题按钮 --- */
        .next-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 0 #5649c0;
            transition: all 0.2s;
            float: right;
        }
        .next-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .next-btn:active { transform: translateY(5px); box-shadow: none; }

        /* --- 结算画面 --- */
        .end-screen {
            display: none;
            padding: 20px 0;
        }
        .end-title { font-size: 2.2rem; color: var(--primary-color); margin-bottom: 10px; }
        .end-score-box {
            background: var(--accent-yellow);
            color: white;
            padding: 20px 40px;
            border-radius: 25px;
            display: inline-block;
            margin: 30px 0;
            box-shadow: 0 8px 0 #e1b12c;
        }
        .end-score { font-size: 3.5rem; font-weight: bold; line-height: 1; }
        .end-desc { color: #636e72; font-size: 1.1rem; margin-bottom: 30px; }
        
        .perfect-score-text {
            background: linear-gradient(45deg, #FFD700, #FF8C00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        /* --- 动画定义 --- */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .confetti {
            position: absolute;
            width: 12px; height: 12px;
            background-color: #f00;
            border-radius: 3px;
            animation: fall linear forwards;
            z-index: 10;
        }
        @keyframes fall {
            to { transform: translateY(80vh) rotate(720deg); opacity: 0; }
        }

    </style>
</head>
<body>

    <div class="game-container">
        <div id="quiz-view">
            <div class="header-stats">
                <span id="level-indicator">Level 1 / 12</span>
                <div class="score-box">⭐ <span id="score">0</span></div>
            </div>

            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>

            <div class="question-area" id="question-container">
                </div>

            <div class="options-grid" id="options-container">
                </div>

            <div class="feedback-section" id="feedback-area">
                <div class="feedback-title" id="feedback-title"></div>
                <div class="explanation-text" id="explanation-text"></div>
                <div style="overflow: hidden;">
                    <button class="next-btn" onclick="nextQuestion()">下一题 ➔</button>
                </div>
            </div>
        </div>

        <div id="end-screen" class="end-screen">
            </div>
    </div>

    <script>
        // --- 题目数据 (分数系统与运算篇) ---
        const quizData = [
            {
                q: "1. 代码 game.score = 1000 的作用是：",
                code: "game.score = 1000",
                options: [
                    "A) 比较分数是否等于1000",
                    "B) 将游戏分数初始化为1000分",
                    "C) 每帧增加1000分",
                    "D) 设置分数上限为1000"
                ],
                correct: 1, // B
                desc: "= 是赋值运算符，将右边的值1000存储到左边的 game.score 中，实现分数初始化。"
            },
            {
                q: "2. ui.track(game, \"score\") 的功能是：",
                code: "ui.track(game, \"score\")",
                options: [
                    "A) 追踪游戏时间",
                    "B) 在屏幕上显示游戏分数",
                    "C) 设置游戏目标",
                    "D) 生成可收集物品"
                ],
                correct: 1, // B
                desc: "ui.track 用于在游戏界面上显示特定属性的值，这里显示分数。"
            },
            {
                q: "3. 在 onCollect 事件中，event.other 代表什么？",
                code: "def onCollect(event):\n    item = event.other",
                options: [
                    "A) 收集者（玩家）",
                    "B) 被收集的物品",
                    "C) 游戏管理器",
                    "D) 敌人单位"
                ],
                correct: 1, // B
                desc: "在 collect 事件中，event.other 是被玩家收集的物品对象。"
            },
            {
                q: "4. 代码 if item.type == \"bronze-coin\": 中的 == 表示：",
                code: "if item.type == \"bronze-coin\":",
                options: [
                    "A) 赋值操作",
                    "B) 比较是否相等",
                    "C) 加法运算",
                    "D) 减法运算"
                ],
                correct: 1, // B
                desc: "== 是相等比较运算符，用于检查物品类型是否等于 \"bronze-coin\"。"
            },
            {
                q: "5. game.score += 1 这行代码的作用是：",
                code: "game.score += 1",
                options: [
                    "A) 将分数设置为1",
                    "B) 在原有分数基础上增加1",
                    "C) 比较分数和1的大小",
                    "D) 将分数减少1"
                ],
                correct: 1, // B
                desc: "+= 是自加运算符，等价于 game.score = game.score + 1。"
            },
            {
                q: "6. game.score -= 0.5 中的 0.5 是什么类型的数值？",
                code: "game.score -= 0.5",
                options: [
                    "A) 整数（int）",
                    "B) 浮点数（float）",
                    "C) 字符串（string）",
                    "D) 布尔值（boolean）"
                ],
                correct: 1, // B
                desc: "0.5 是小数，在编程中称为浮点数（float）。"
            },
            {
                q: "7. 防止分数变为负数的代码段是：",
                  options: [
                    "A) if game.score > 0: game.score = 0",
                    "B) if game.score < 0: game.score = 0",
                    "C) game.score = 0",
                    "D) game.score -= 0.5"
                ],
                correct: 1, // B
                desc: "当分数小于0时，将其重置为0，确保分数不会变成负数。"
            },
            {
                q: "8. 主循环 while True: 的作用是：",
                code: "while True:",
                options: [
                    "A) 只运行一次就结束",
                    "B) 让游戏逻辑每一帧都执行",
                    "C) 生成游戏角色",
                    "D) 显示游戏界面"
                ],
                correct: 1, // B
                desc: "while True: 是无限循环，确保游戏逻辑在每一帧都被执行。"
            },
            {
                q: "9. player.on(\"collect\", onCollect) 这行代码的功能是：",
                code: "player.on(\"collect\", onCollect)",
                options: [
                    "A) 生成收集物品",
                    "B) 为玩家注册collect事件的处理函数",
                    "C) 立即执行onCollect函数",
                    "D) 设置游戏分数"
                ],
                correct: 1, // B
                desc: ".on() 方法用于事件绑定，这里将collect事件与onCollect函数关联。"
            },
            {
                q: "10. 这个分数系统的设计理念是：",
                options: [
                    "A) 分数保持不变",
                    "B) 只加分不减分",
                    "C) 起始分高但随时间减少，鼓励快速收集",
                    "D) 分数从0开始不断增加"
                ],
                correct: 2, // C
                desc: "系统设计为高起始分但随时间扣分，激励玩家快速行动。"
            },
            {
                q: "11. 在 checkTimeScore 函数中，分数减少的机制是：",
                code: "def checkTimeScore():\n    game.score -= 0.5",
                options: [
                    "A) 每秒减少1分",
                    "B) 每收集一个物品减少0.5分",
                    "C) 每一帧减少0.5分",
                    "D) 游戏结束时统一扣分"
                ],
                correct: 2, // C
                desc: "game.score -= 0.5 在每一帧都执行，实现持续扣分。"
            },
            {
                q: "12. 关于这个分数系统的下限，正确的是：",
                options: [
                    "A) 分数可以无限降低到负数",
                    "B) 分数最低为0",
                    "C) 分数最低为1000",
                    "D) 没有下限限制"
                ],
                correct: 1, // B
                desc: "通过 if game.score < 0: game.score = 0 确保分数不会低于0。"
            }
        ];

        // --- 游戏状态变量 ---
        let currentQuestion = 0;
        let score = 0;
        let answered = false;

        // --- DOM 元素 ---
        const quizView = document.getElementById('quiz-view');
        const endScreen = document.getElementById('end-screen');
        const questionContainer = document.getElementById('question-container');
        const optionsContainer = document.getElementById('options-container');
        const levelIndicator = document.getElementById('level-indicator');
        const scoreDisplay = document.getElementById('score');
        const progressBar = document.getElementById('progress-bar');
        const feedbackArea = document.getElementById('feedback-area');
        const feedbackTitle = document.getElementById('feedback-title');
        const explanationText = document.getElementById('explanation-text');

        // --- 初始化游戏 ---
        function loadQuestion() {
            answered = false;
            feedbackArea.style.display = 'none';
            
            const data = quizData[currentQuestion];
            
            levelIndicator.innerText = `Level ${currentQuestion + 1} / ${quizData.length}`;
            progressBar.style.width = `${((currentQuestion) / quizData.length) * 100}%`;
            scoreDisplay.innerText = score;
            
            let html = `<h2>${data.q}</h2>`;
            if (data.code) {
                // 优化的 HTML 转义与高亮逻辑
                let codeHtml = escapeHtml(data.code);

                // 1. 字符串高亮
                codeHtml = codeHtml.replace(/(".*?")/g, '<span class="str">$1</span>');

                // 2. 注释高亮
                codeHtml = codeHtml.replace(/(#.*)/g, '<span class="cmt">$1</span>');

                // 3. 关键字高亮 (新增 score, track, collect 等)
                codeHtml = codeHtml.replace(/\b(def|return|hero|game|ui|player|pet|on|off|hear|spawn|event|onSpawn|setActionFor|friendUnit|enemy|target|attack|moveXY|soldier|while|True|False|if|else|elif|unit|findNearestEnemy|centerFormation|defendLane|pos|spawnPlayerXY|addDefeatGoal|guardian|munchkin|spawnTime|nextTime|time|randomInteger|onDefeat|toDefeat|defeated|spawnXY|behavior|min|max|ogre|addManualGoal|setGoalState|scoutGoal|bossGoal|scoutsDefeated|type|global|completeGoal|setState|munchkinSpawner|passageForest1|spawnType|defeat|destroy|track|generator|collect|onCollect|collector|item|value|health|requiredScore|score|itemSpawnTime|spawnRandomItem|collide|onCollide|scale|fence|mushroom|powerEndTime|powerDuration|other|spawnValuable|destroyTime|lifetime|checkSpawns|spawnInterval|db|get|set|spawnTreasures|topScore|spawnOgreWave|offset|forest|bronze-coin|knight|maxSpeed|gem|range|checkTimeScore)\b/g, '<span class="kw">$1</span>');
                
                // 4. 数字高亮
                codeHtml = codeHtml.replace(/\b(\d+|-\d+|\d+\.\d+)\b/g, '<span class="num">$1</span>');

                // 5. 方法调用 (.xxx)
                codeHtml = codeHtml.replace(/(\.\w+)/g, '<span class="fn">$1</span>');

                html += `<div class="code-block">${codeHtml}</div>`;
            }
            questionContainer.innerHTML = html;
            
            optionsContainer.innerHTML = '';
            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.classList.add('option-btn');
                btn.onclick = () => checkAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        // --- 检查答案 ---
        function checkAnswer(selectedIndex, btnElement) {
            if (answered) return;
            answered = true;

            const data = quizData[currentQuestion];
            const allBtns = optionsContainer.querySelectorAll('.option-btn');
            
            allBtns.forEach(btn => btn.setAttribute('disabled', 'true'));
            
            if (selectedIndex === data.correct) {
                btnElement.classList.add('correct');
                score += 100;
                scoreDisplay.innerText = score;
                createConfetti();
                showFeedback(true, "🎉 回答正确！", data.desc);
            } else {
                btnElement.classList.add('wrong');
                setTimeout(() => {
                   allBtns[data.correct].classList.add('correct');
                }, 400);
                const rightAnswerChar = ["A", "B", "C", "D"][data.correct];
                showFeedback(false, `❌ 回答错误，正确答案是 ${rightAnswerChar}`, data.desc);
            }
        }

        // --- 显示解析 ---
        function showFeedback(isCorrect, title, desc) {
            feedbackArea.classList.remove('correct', 'wrong');
            feedbackArea.classList.add(isCorrect ? 'correct' : 'wrong');
            feedbackTitle.innerHTML = title;
            explanationText.innerHTML = desc;
            feedbackArea.style.display = 'block';
            feedbackArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // --- 下一题 ---
        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                loadQuestion();
            } else {
                showEndScreen();
            }
        }

        // --- 结束画面 ---
        function showEndScreen() {
            quizView.style.display = 'none';
            endScreen.style.display = 'block';
            progressBar.parentElement.style.display = 'none'; 

            const totalScore = quizData.length * 100;
            const isPerfect = (score === totalScore);
            
            let html = '';
            if (isPerfect) {
                for(let i=0; i<5; i++) setTimeout(createConfetti, i*300);
                html += `<div class="end-title">🎉 算术运算大师！ 🎉</div>`;
                html += `<div class="end-score-box">总得分 <div class="end-score perfect-score-text">${score}</div></div>`;
                html += `<div class="end-desc">太棒了！你已经熟练掌握了分数逻辑与数据运算！</div>`;
            } else {
                html += `<div class="end-title">挑战完成！</div>`;
                html += `<div class="end-score-box">总得分 <div class="end-score">${score} / ${totalScore}</div></div>`;
                html += `<div class="end-desc">做得不错！继续加油，让数字逻辑更加精准！</div>`;
            }
            html += `<button class="next-btn" onclick="location.reload()" style="float:none; font-size:1.2rem; padding: 15px 40px;">🔄 再玩一次</button>`;
            
            endScreen.innerHTML = html;
        }

        // --- 撒花特效 ---
        function createConfetti() {
            const colors = ['#ff7675', '#74b9ff', '#55efc4', '#ffeaa7', '#a29bfe', '#fdcb6e'];
            const container = document.querySelector('.game-container');
            for (let i = 0; i < 40; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = '-20px';
                const scale = Math.random() * 0.6 + 0.4;
                confetti.style.transform = `scale(${scale}) rotate(${Math.random()*360}deg)`;
                confetti.style.animationDuration = (Math.random() * 1.5 + 1) + 's';
                confetti.style.animationDelay = Math.random() * 0.5 + 's';
                
                container.appendChild(confetti);
                setTimeout(() => confetti.remove(), 2500);
            }
        }

        // --- HTML转义 ---
        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        // --- 启动游戏 ---
        loadQuestion();

    </script>
</body>
</html>
